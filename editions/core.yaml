# ИЗДАНИЕ CORE (базовое): одиночная генерация, MCP для метаданных категории B,
# все четыре оси SMOP, ранжирование по Q.

name: core
mode: single-shot                    # одна генерация на задачу (не agentic-цикл)
context: mcp                         # кат. B достаёт метаданные запросом к синтетической базе; кат. A MCP не нужен
scorers: [syntax, meaning, optimization, platform]   # фактически считается scorers ∩ applies_to: для кат. A платформа = N/A, не 0
leaderboard_view: quality            # ранжирование по интегральному баллу Q
