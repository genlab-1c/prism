# ИЗДАНИЕ CORE (базовое): одна кодогенерация на прогон, агентный сбор метаданных
# для категории B, все четыре оси SMOP, ранжирование по Q.
# Каждое поле потребляется кодом (правило «нет мёртвых строк в конфигах»):
#   mode             → harness/generate/run.py (поддержан single-shot)
#   context          → harness/generate/run.py (доставка метаданных B: agentic)
#   scorers          → harness/orchestrate.py (какие оси считать)
#   leaderboard_view → harness/orchestrate.py (ранжирование сводки prism score)

name: core
mode: single-shot                    # одна кодогенерация на прогон (не agentic-цикл кодогенерации)
context: agentic                     # кат. B: модель сама навигирует метаданные инструментами; кат. A контекст не нужен
scorers: [syntax, meaning, optimization, platform]   # фактически scorers ∩ applies_to: для кат. A платформа = N/A, не 0
leaderboard_view: quality            # ранжирование по интегральному баллу Q
