# Цены токенов — ВОЛАТИЛЬНЫ, поэтому отдельной ДАТИРОВАННОЙ таблицей, а не в каталоге
# моделей (см. шапку models.yaml). Используются только для учёта стоимости прогона
# (живой счётчик, кап, предполётная оценка) — на баллы SMOP не влияют.
#
# Единицы: USD за 1 000 000 токенов (как публикуют провайдеры). Ключ — id модели
# (как в models.yaml), не ключ каталога. Модель без записи → стоимость считается
# нулевой, раннер один раз предупреждает (бюджет недосчитан, а не соврал).
#
# Обновление: правьте as_of + source при сверке с тарифами. Это снимок, не истина.

