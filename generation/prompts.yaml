# Системные промпты генерации (текст) по категориям — переиспользуемые шаблоны-обёртки.
# Task-промпт (условие конкретной задачи) живёт в tasks/<id>/task.yaml, не здесь.
#
# Сборка финального промпта модели (контракт воспроизводимости):
#   итог = system[категория] + task.prompt
#   для категории B дополнительно — контекст метаданных синтетической конфы через MCP.

system:
  A: |
    Разработка для платформы 1С:Предприятие 8.3.
    ТРЕБОВАНИЯ К КОДУ:
    1. Пишите на встроенном языке 1С (русский синтаксис)
    2. Возвращайте ТОЛЬКО код без пояснений
    3. Код должен быть готов к выполнению

# system.B пока не переносим: B-задачи переосмысляются под синтетическую конфу
# (метаданные через MCP), старый промпт под УТ11 устарел. Добавим при доработке B.
