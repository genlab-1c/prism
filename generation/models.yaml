# Каталог моделей-генераторов — переиспользуемый реестр.
# На ключ (claude/gpt/gemini) ссылаются generation/params.yaml и результаты прогонов.
#
# Волатильные данные (цена) здесь НЕ храним: тарифы меняются — ненадёжно. При расчёте
# стоимости (издание eco) цена берётся отдельной датированной таблицей или из API провайдера
# (id — в формате OpenRouter, можно тянуть динамически).
models:
  claude:
    id: "anthropic/claude-opus-4.5"
    name: "Claude Opus 4.5"
    provider: anthropic
    capabilities:
      context_window: 200000
      supports_seed: false
      supports_tools: true
      determinism_param: temperature

  gpt:
    id: "openai/gpt-5.2-codex"
    name: "GPT-5.2 Codex"
    provider: openai
    capabilities:
      context_window: 400000
      supports_seed: true
      supports_tools: true
      determinism_param: seed

  gemini:
    id: "google/gemini-3-flash-preview"
    name: "Gemini 3 Flash"
    provider: google
    capabilities:
      context_window: 1048576
      supports_seed: true
      supports_tools: true
      determinism_param: seed
