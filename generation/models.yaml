# Каталог моделей-генераторов — переиспользуемый реестр.
# На ключ (claude/gpt/gemini/...) ссылаются generation/params.yaml и результаты прогонов.
#
# Схема записи:
#   vendor — кто сделал модель (факт о модели);
#   access.adapter — каким адаптером харнесса ходим (канал доступа, harness/generate/adapters/):
#     openrouter    — шлюз OpenRouter;
#     openai_compat — любой OpenAI-совместимый API (Ollama, vLLM, LM Studio; нужен endpoint);
#     gigachat, yandexgpt, ... — провайдеры со своим протоколом (адаптер на каждого).
#   Вендор ≠ канал: Claude может идти через OpenRouter, Qwen — локально через Ollama.
#
# Воспроизводимость: для локальных моделей фиксируйте квантизацию/версию весов прямо в id
# (например qwen2.5-coder:32b-q8_0) — разная квантизация = разная модель.
# Волатильные данные (цены) здесь НЕ храним: при расчёте стоимости (издание eco) цена
# берётся отдельной датированной таблицей или из API провайдера.

models:
  claude:
    id: "anthropic/claude-opus-4.5"
    name: "Claude Opus 4.5"
    vendor: anthropic
    access:
      adapter: openrouter
    capabilities:
      context_window: 200000
      supports_seed: false
      supports_tools: true

  gpt:
    id: "openai/gpt-5.2-codex"
    name: "GPT-5.2 Codex"
    vendor: openai
    access:
      adapter: openrouter
    capabilities:
      context_window: 400000
      supports_seed: true
      supports_tools: true

  gemini:
    id: "google/gemini-3-flash-preview"
    name: "Gemini 3 Flash"
    vendor: google
    access:
      adapter: openrouter
    capabilities:
      context_window: 1048576
      supports_seed: true
      supports_tools: true

