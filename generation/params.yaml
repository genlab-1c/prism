# Параметры генерации (run-config) — ТОЛЬКО числовые ручки.
# Отделено от: определений задач (tasks/), каталога моделей (generation/models.yaml),
# текста промптов (generation/prompts.yaml).

defaults:
  max_tokens: 16384                               # запас под reasoning-модели (рассуждение сидит в выходном бюджете);
                                                   # не-reasoning модели заканчивают ответ сами задолго до потолка → им не вредит.
                                                   # Для дорогих моделей на aitunnel помнить: предоценка ключа растёт пропорционально (см. memory)
  concurrency: 4                                 # параллельных пар (задача×модель); I/O-bound
  model_params:
    alice:    { temperature: 0.1, runs: 1 }      # Alice AI LLM (Yandex)
    gemini:   { temperature: 0.1, runs: 1 }      # Gemini 2.5 Flash Lite (OpenRouter)
    deepseek: { temperature: 0.1, runs: 1 }      # DeepSeek V4-Flash (OpenRouter)
    qwen:     { temperature: 0.1, runs: 1 }      # Qwen3-235B-A22B (OpenRouter)
    glm:      { temperature: 0.1, runs: 1 }      # GLM-4.7 Flash (OpenRouter)
    sonnet:   { temperature: 0.1, runs: 1 }      # Claude Sonnet 4.6 (OpenRouter)
    opus:     { temperature: 0.1, runs: 1 }      # Claude Opus 4.8 (OpenRouter)
    ygpt5_lite:  { temperature: 0.1, runs: 1 }   # YandexGPT 5 Lite (Yandex Responses API)
    ygpt51_pro:  { temperature: 0.1, runs: 1 }   # YandexGPT 5.1 Pro (Yandex Responses API)
    qwen36:      { temperature: 0.1, runs: 1 }   # Qwen3.6-35B-A3B (Yandex Responses API, tools)
    ygpt5_pro:   { temperature: 0.1, runs: 1 }   # YandexGPT 5 Pro (Yandex Responses API, tools)
    alice_flash: { temperature: 0.1, runs: 1 }   # Alice AI LLM Flash (Yandex Responses API, tools)
    gigachat_max:  { temperature: 0.1, runs: 1 }  # GigaChat 2 Max (Сбер)
    gigachat_pro:  { temperature: 0.1, runs: 1 }  # GigaChat 2 Pro (Сбер)
    gigachat_lite: { temperature: 0.1, runs: 1 }  # GigaChat 2 Lite (Сбер)
    gpt55:    { temperature: 0.1, runs: 1 }        # GPT-5.5 через AITUNNEL (reasoning — следить за обрезкой)
    gpt5_mini:   { temperature: 0.1, runs: 1 }     # GPT-5 Mini через AITUNNEL
    gpt_oss120b: { temperature: 0.1, runs: 1 }     # GPT-OSS 120B через AITUNNEL
    gemini31_pro: { temperature: 0.1, runs: 1 }    # Gemini 3.1 Pro через AITUNNEL
    gemini35_flash: { temperature: 0.1, runs: 1 }  # Gemini 3.5 Flash через AITUNNEL
    mimo25:      { temperature: 0.1, runs: 1 }      # MiMo-V2.5 (Xiaomi) через AITUNNEL
    minimax_m3:  { temperature: 0.1, runs: 1 }      # MiniMax M3 через AITUNNEL (reasoning)
