[tool.commitizen]
# Правила сообщений коммитов: Conventional Commits
#   <тип>(<область>): <краткое описание>   ← заголовок на английском, в повелительном наклонении
#   <пустая строка>
#   <тело>                                  ← можно на русском
# Типы: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert
name = "cz_conventional_commits"
version = "0.1.0"
tag_format = "v$version"
version_scheme = "semver"
major_version_zero = true          # держим 0.x, пока бенчмарк не стабилизирован
update_changelog_on_bump = true
