# SMOP — КОНСТИТУЦИЯ метрики (общая для всех уровней оценки)
#
# Это «ЧТО мы меряем»: оси, шкала, границы конструкта, применимость, правило Q.
# «КАК меряем» — в протоколах (оба обязаны соблюдать эту конституцию):
#   metrics/smop_l1_auto.yaml    — Уровень 1 (оракул: компилятор / тесты / линтер / схема)
#   metrics/smop_l2_expert.yaml  — Уровень 2 (эксперт-человек)
#
# Зачем общая конституция: PRISM — согласие L1 между L2 (κ auto↔expert).
# Чтобы его считать, обе оси должны мерить ОДНО И ТО ЖЕ на ОДНОЙ шкале. Различаются
# только протоколы (инструмент и достижимая гранулярность), но не определения осей.

scale:
  # Общий диапазон обоих уровней; используются все шесть значений.
  # Конкретные пороги (сколько ошибок/правок → какой балл) задаёт каждый протокол
  valid_scores: [0, 2, 4, 6, 8, 10]

smop:
  S:
    name: "Синтаксическая корректность"
    name_en: "Syntax"
    measures: "Компилируется ли модуль — и только это"
    applies_to: [A, B]
    excludes:
      - "несуществующие имена метаданных → P"
      - "ошибки логики / текста запроса (компилируются, но неверны) → M"
      - "предупреждения и отклонения от стандартов → O"
    ground_truth: "для категории B истина по S — сам компилятор 1С, не сверка с экспертом"

  M:
    name: "Семантическая корректность"
    name_en: "Meaning"
    measures: "Соответствие логики кода требованиям задания"
    applies_to: [A, B]
    method: "исполнение скрытых тестов (pass@k); не исполнился → 0 (нет подтверждённого смысла)"

  O:
    name: "Оптимальность"
    name_en: "Optimization"
    measures: "Соответствие стандартам разработки и оптимальность решения"
    applies_to: [A, B]
    construct:
      - "O-авто: механические антипаттерны (запрос в цикле, ВТ без параметров) — измеримы машиной"
      - "O-арх: архитектурная оптимальность (выбор алгоритма, структура решения) — суждение эксперта"

  P:
    name: "Платформенная интеграция"
    name_en: "Platform"
    measures: "Корректность использования объектов метаданных платформы"
    # для категории A = N/A (нет обращений к метаданным)
    applies_to: [B]
    method: "сверка обращений к метаданным со схемой конфигурации (precision/recall)"

# Интегральный балл Q
quality_score:
  name: "Q"
  description: "Среднее по применимым к категории осям SMOP"
  # кат. A: (S+M+O)/3 ; кат. B: (S+M+O+P)/4
  formula: mean_of_applicable
  # главное — вектор [S,M,O,P]; Q вторичен, для грубого ранжирования
  primary_result: vector

# Пороговые значения для интерпретации Q (общие для обоих уровней)
quality_thresholds:
  # Q >= 8  — высокое качество
  high: 8
  # 5..8    — приемлемое
  acceptable: 5
  # < 5     — низкое
  low: 0

meta:
  version: "1.0.0"
  description: "Конституция метрики SMOP — общие определения для уровней L1 (авто) и L2 (эксперт)"
  author: "Андреев Д.С."
