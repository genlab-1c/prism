# SMOP — КОНСТИТУЦИЯ метрики (общая для всех уровней оценки).
#
# Это «ЧТО мы меряем»: оси, шкала, границы конструкта, применимость, правило Q.
# «КАК меряем» — в протоколах (оба обязаны соблюдать эту конституцию):
#   metrics/smop_l1_auto.yaml    — Уровень 1 (оракул: компилятор / тесты / линтер / схема)
#   metrics/smop_l2_expert.yaml  — Уровень 2 (эксперт-человек)
#
# Зачем общая конституция: ключевой результат PRISM — согласие L1 с L2 (κ auto↔expert).
# Чтобы его считать, оба уровня должны мерить ОДНО И ТО ЖЕ на ОДНОЙ шкале. Различаются
# только протоколы (инструмент и дробность балла), но не определения осей.

scale:
  valid_scores: [0, 2, 4, 6, 8, 10]   # 6-ступенчатая шкала ЭКСПЕРТА (чётная — чтобы не было
                                       # серединки): общий язык, на котором сверяют L1 и L2.
  # Машина (L1) для осей-долей (M, P) мерит ПЛАВНО (доля × 10) и эту плавную оценку
  # показывает на лидерборде — так у неё нет мёртвых зон 6-балльной шкалы (напр. 4/5=80%
  # = 8.0, а не округляется до 6). В 6 ступенек плавную оценку проецируют ТОЛЬКО в момент
  # сверки с экспертом (κ auto↔expert), у которого иной шкалы нет. То есть ступенька —
  # инструмент сравнения, а не само измерение. Проекция: scoring.table протокола L1.

# Оси SMOP. excludes — что НЕ входит в ось и на какую ось уходит (границы конструкта).
smop:

  S:
    name: Синтаксическая корректность
    name_en: Syntax
    measures: компилируется ли модуль — и только это
    applies_to: [A, B]
    excludes:
      - несуществующие имена метаданных → P
      - ошибки логики / текста запроса (компилируются, но неверны) → M
      - предупреждения и отклонения от стандартов → O
    ground_truth: для категории B истина по S — сам компилятор 1С, не сверка с экспертом

  M:
    name: Семантическая корректность
    name_en: Meaning
    measures: соответствие логики кода требованиям задания
    applies_to: [A, B]
    method: исполнение скрытых тестов (pass@k); не исполнился → 0 (нет подтверждённого смысла)

  O:
    name: Оптимальность
    name_en: Optimization
    measures: соответствие стандартам разработки и оптимальность решения
    applies_to: [A, B]
    construct:
      - >-
        O-авто — механические perf/арх-антипаттерны (запрос в цикле, ВТ без параметров),
        измеримы статикой. Несут сигнал в категории B; в алгоритмике A их почти не бывает,
        поэтому одной статики для A недостаточно.
      - >-
        O-исп — алгоритмическая оптимальность ИСПОЛНЕНИЕМ для категории A. Решение гоняется
        на растущем входе, класс роста числа операций сравнивается с оптимальным для задачи.
        Часть прежней O-арх, ставшая измеримой машиной для задач с явным классом сложности.
      - >-
        O-арх — архитектурная оптимальность, не сводимая к классу роста (выбор структуры,
        читаемость, уместность приёма) — суждение эксперта (Уровень 2).

  P:
    name: Платформенная интеграция
    name_en: Platform
    measures: корректность использования объектов метаданных платформы
    applies_to: [B]                   # для категории A = N/A (нет обращений к метаданным)
    method: подтверждение обращений к метаданным исполнением против конфигурации задачи;
      инструмент и сигнал — в протоколах (статическая сверка v0 выведена как анти-валидная,
      см. docs/validity.md)

# Интегральный балл Q — среднее по применимым к категории осям.
quality_score:
  name: Q
  formula: mean_of_applicable         # кат. A: (S+M+O)/3 ; кат. B: (S+M+O+P)/4
  primary_result: vector              # главное — вектор [S,M,O,P]; Q вторичен, для грубого ранжирования

quality_thresholds:                   # интерпретация Q (общая для L1 и L2)
  high: 8                             # Q ≥ 8 — высокое
  acceptable: 5                       # 5 ≤ Q < 8 — приемлемое
  low: 0                              # Q < 5 — низкое

meta:
  version: "1.1.0"          # 1.1.0: P — метод подтверждается исполнением (анти-валидная статика выведена)
  description: Конституция метрики SMOP — общие определения для уровней L1 (авто) и L2 (эксперт)
  author: Андреев Д.С.
