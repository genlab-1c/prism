# SMOP — ПРОТОКОЛ УРОВНЯ 1 (авто-оценка оракулами):
# «КАК машина вообще выводит балл».
#
# Балл каждой оси — из ОДНОЙ таблицы scoring.table (единственный источник правды:
# и человеку, и скореру). Строки проверяются сверху вниз, берётся первый подходящий;
# направление сравнения задаёт scoring.direction:
#   lower_is_better   — bound = «не больше N» (≤); меньше сигнала → выше балл  (S, O, P)
#   higher_is_better  — bound = «не меньше N» (≥); больше сигнала → выше балл  (M)
#   exclusive: true   — строгое сравнение (< / >)
#   else: true        — хвостовая строка «во всех прочих случаях»
# Достижимые баллы оси = множество score её таблицы (+ pre_check, если задан).
# Значения совпадают по шкале с L2 (metrics/smop_l2_expert.yaml), иначе κ auto↔expert неизмеримо.
#
# Гейтинг: нет инструмента оси (поле instrument) → ось НЕ измерена для прогона и
# исключается из Q как N/A — НЕ ставится 0.

protocol:
  level: 1
  name: auto
  constitution: metrics/smop.yaml

axes:

  S:
    measures: компилируется ли модуль
    instrument:
      A: BSL Language Server (статический парсер)
      B: компилятор 1С (DESIGNER /CheckModules -Server) — ошибки только модуля кандидата
    signal:
      count: корневые причины = кластеры ParseError + compile-блокеры
      cluster_rule: соседние ParseError в пределах cluster_gap строк считаются одной причиной
    excludes:
      - предупреждения и стандарты (DeprecatedCurrentDate и т.п.) → ось O
    pre_check:                          # минует таблицу, отдаёт 0 напрямую
      rule: дисбаланс парности (Функция/КонецФункции, Если, Цикл, Попытка) → S=0
      why: ловит обрезанную генерацию, которую парсер молча пропускает
    scoring:
      unit: корневые причины
      direction: lower_is_better
      table:
        - { bound: 0, score: 10 }       # без ошибок
        - { bound: 1, score: 8 }        # одна причина
        - { bound: 3, score: 6 }        # 2–3
        - { bound: 6, score: 4 }        # 4–6
        - { else: true, score: 2 }      # больше 6
    cluster_gap: 3
    compile_blocker_codes: [ProcedureReturnsValue]   # не-ParseError диагностики «не скомпилируется»

  M:
    measures: соответствие логики требованиям — исполнением скрытых тестов
    instrument:
      A: OneScript 2.0
      B: 1С против синтетической базы задачи (harness/execute/onec; формат проверок — родной, миграция на YAXUNIT — план)
    signal:
      share: доля прошедших тестов passed/total
      floor: не скомпилировался / не исполнился → 0 (нет подтверждённого смысла)
    scoring:
      unit: доля прошедших тестов
      direction: higher_is_better
      leaderboard: плавная оценка = доля × 10 (хранимая, лидербордная); таблица ниже —
        проекция этой доли в 6 ступенек ТОЛЬКО для сверки с экспертом (κ). Так уходит
        мёртвая зона — 4/5=80% даёт на лидерборде 8.0, а в сверке проецируется в ступеньку 6.
      table:
        - { bound: 1.00, score: 10 }                  # 100%
        - { bound: 0.85, score: 8 }                   # ≥ 85%
        - { bound: 0.60, score: 6 }                   # ≥ 60%
        - { bound: 0.50, score: 4 }                   # ≥ 50%
        - { bound: 0.0, exclusive: true, score: 2 }   # > 0%
        - { else: true, score: 0 }                    # 0% или не исполнился

  O:
    measures: оптимальность решения — исполнением (O-исп, есть perf.yaml) или статикой (O-авто, откат)
    coverage: |
      O-исп — класс роста ИСПОЛНЕНИЕМ: A — число операций на растущем входе (codestat,
      exec_scoring, harness/score/optimization_exec.py); B — число обращений к СУБД на растущей
      базе (техжурнал 1С, b_exec_scoring, harness/score/optimization_b_exec.py + execute/onec/perf_run.py).
      O-авто — perf/арх-антипаттерны статикой (white_list): откат для задач без perf.yaml.
      O-арх (неалгоритмическая архитектура) остаётся на Уровень 2.
      Балл оси по задаче: есть perf.yaml → ТОЛЬКО O-исп; если код не исполняется, O = N/A
      (НЕ откат на статический O-авто: он мерит вид кода в отрыве от исполнения — выдавал бы
      высокий балл неисполнимому коду; в кат. B наблюдали O-авто=10 при M=0). Без perf → O-авто,
      но ТОЛЬКО для исполнившегося кода (гейт по исполнению orchestrate._score_optimization):
      не скомпилировался / не запустился → N/A. N/A исключается из Q, как ось P для A. ОГОВОРКА κ: эксперт оценивает O холистически
      (асимптотика + структура + стиль), а O-исп — только класс роста; согласие L1↔L2 по O
      считать с этой поправкой.
    instrument: BSL LS (O-авто, white_list) · OneScript -codestat (O-исп A) · техжурнал 1С (O-исп B)
    signal:
      weight: взвешенная сумма сработавших диагностик из white_list
      excludes: стилевой шум (MagicNumber, LineLength) — сознательно вне S и O (антикоррелировал с экспертом)
    white_list:                         # код диагностики BSL LS → вес вклада
      CreateQueryInCycle: 2.0           # запрос в цикле — заглавный антипаттерн O-авто (конституция, L2 балл 4)
      VirtualTableCallWithoutParameters: 2.0
      JoinWithVirtualTable: 2.0
      JoinWithSubQuery: 1.5
      QueryNestedFieldsByDot: 1.0
      DeprecatedCurrentDate: 1.0
      SelectTopWithoutOrderBy: 1.0
      LogicalOrInTheWhereSectionOfQuery: 1.0   # ИЛИ в ГДЕ — неиндексируемо (встречается в генерациях B)
      RefOveruse: 1.0                          # лишнее обращение .Ссылка → неявное соединение на строку
      # QueryToMissingMetadata выведена: несуществующие метаданные — конструкт оси P
      # (конституция, excludes S), с переводом P на исполнение был бы двойной штраф
    scoring:
      unit: суммарный вес антипаттернов
      direction: lower_is_better
      floor_note: машина не опускает O ниже 2 — считает лишь ограниченный список (честный предел инструмента)
      reachable_note: достижимые ступени L1 = {2,4,6,8,10} — без 0 и почти без 2 (для O=2 нужен
        вес >6, т.е. ≥4 тяжёлых хита). L2 же активно ставит 0 и 2 («критические проблемы»,
        «множественные антипаттерны»). Поэтому нижние ступени L1↔L2 несопоставимы напрямую —
        κ по O считать с учётом усечённой проекции (как взвешенную по P, см. validity.md)
      table:
        - { bound: 0, score: 10 }       # чисто
        - { bound: 1, score: 8 }        # ≤ 1
        - { bound: 3, score: 6 }        # ≤ 3
        - { bound: 6, score: 4 }        # ≤ 6
        - { else: true, score: 2 }      # > 6
    exec_scoring:                       # O-ИСПОЛНЕНИЕ (категория A): алгоритмическая оптимальность
      what: |
        Статика в алгоритмике A антипаттернов не видит (O-авто упирается в 10). Поэтому для A
        оптимальность мерится ИСПОЛНЕНИЕМ: решение гоняется на лесенке размеров входа (perf.yaml),
        число операций берётся из oscript -codestat, показатель роста p сравнивается с оптимальным
        для задачи p_opt. Стоимость встроенных команд (Найти, склейка строк) учитывается подменой
        на инструментированные аналоги. Сигнал = отклонение d = p − p_opt (меньше → лучше).
      direction: lower_is_better        # меньше отклонение роста от оптимума → выше балл
      table:
        - { bound: 0.2, score: 10 }     # на уровне оптимального класса
        - { bound: 0.5, score: 8 }      # чуть хуже
        - { bound: 0.8, score: 6 }      # заметно хуже
        - { bound: 1.2, score: 4 }      # на класс хуже (напр. n vs n²)
        - { else: true, score: 2 }      # катастрофически хуже / таймаут
    b_exec_scoring:                     # O-ИСПОЛНЕНИЕ (категория B): оптимальность обращений к СУБД
      what: |
        Близнец exec_scoring для платформенных задач. Единица работы — не шаг кода, а ПОХОД В СУБД;
        вход растёт как БАЗА (perf.sizes = размер синтетической базы). Кандидат гоняется на лесенке
        размеров базы, число обращений к данным, атрибутированных кандидату по Context техжурнала 1С
        (harness/execute/onec/perf_run.py), даёт показатель роста p. Решение НАБОРОМ (одна вирт.таблица
        /один запрос) → обращения не растут с базой, p≈0 = p_opt. «Запрос в цикле» → p≈1 (линейный рост).
        Сигнал = отклонение d = p − p_opt. Ловит по ЭФФЕКТУ то же, что O-авто по виду кода
        (CreateQueryInCycle, ВТ без параметров, RefOveruse), плюс скрытое в вызванных процедурах.
      direction: lower_is_better
      table:
        - { bound: 0.2, score: 10 }     # обращения плоские при росте базы — набором (оптимум)
        - { bound: 0.5, score: 8 }      # слегка растут
        - { bound: 0.8, score: 6 }      # заметно растут
        - { bound: 1.2, score: 4 }      # линейно растут с базой — запрос в цикле
        - { else: true, score: 2 }      # хуже линейного (таймаут для B → N/A, не 2: замер не состоялся)

  P:
    applies_to: [B]                     # для категории A = N/A (см. конституцию)
    measures: корректность обращений к объектам метаданных — исполнением против синтетической базы
    instrument: тот же прогон 1С, что и ось M (harness/execute/onec) — один запуск, два сигнала
    signal:
      share: доля тестов, исполнившихся БЕЗ платформенной ошибки (clean/total)
      markers: классификатор платформенных ошибок — PLATFORM_ERROR_MARKERS раннера
        («Поле не найдено», «Объект не найден», ошибки исполнения запроса и т.п.)
      boundary: неверный ОТВЕТ (FAIL по значению) платформенной ошибкой не считается —
        это ось M; P ловит только «упал на обращении к метаданным»
    history: статическая сверка со срезом схемы (v0) выведена из L1 — анти-валидна
      (ρ=−0.27 с экспертом, см. docs/validity.md); исполнение — её замена
    pre_check:                          # минует таблицу, отдаёт 0 напрямую
      rule: функции кандидата нет / модуль не компилируется → P=0
      why: ни одного подтверждённого обращения к метаданным (аналог floor оси M)
    scoring:
      unit: доля тестов без платформенных ошибок
      direction: higher_is_better
      leaderboard: плавная оценка = чистая доля × 10 (хранимая, лидербордная); таблица —
        проекция в ступеньки только для сверки с экспертом
      reachable_note: ступеньки проекции достижимы {0,4,6,10} — без 2 и 8; единица L1 — тест,
        единица L2 — обращение к объекту, поэтому κ по P считать взвешенной (см. validity.md).
        На лидерборде P плавная, эта дискретность касается только сверки
      table:
        - { bound: 1.00, score: 10 }                  # все обращения к метаданным отработали
        - { bound: 0.50, score: 6 }                   # большинство обращений верны
        - { bound: 0.0, exclusive: true, score: 4 }   # хоть один тест пережил контакт с базой
        - { else: true, score: 0 }                    # ни одного: структура обращений вымышлена

meta:
  version: "1.2.0"          # 1.2.0: O — b_exec_scoring, исполнительная нога для B (техжурнал 1С)
                            # 1.1.0: P — исполнение против синтетической базы (вместо статики);
                            #        O — QueryToMissingMetadata выведена (конструкт P)
  description: Протокол автоматической оценки SMOP (Уровень 1)
  author: Андреев Д.С.
