# SMOP — ПРОТОКОЛ УРОВНЯ 1 (авто-оценка оракулами):
# «КАК машина вообще выводит балл».
#
# Балл каждой оси — из ОДНОЙ таблицы scoring.table (единственный источник правды:
# и человеку, и скореру). Строки проверяются сверху вниз, берётся первый подходящий;
# направление сравнения задаёт scoring.direction:
#   lower_is_better   — bound = «не больше N» (≤); меньше сигнала → выше балл  (S, O, P)
#   higher_is_better  — bound = «не меньше N» (≥); больше сигнала → выше балл  (M)
#   exclusive: true   — строгое сравнение (< / >)
#   else: true        — хвостовая строка «во всех прочих случаях»
# Достижимые баллы оси = множество score её таблицы (+ pre_check, если задан).
# Значения совпадают по шкале с L2 (metrics/smop_l2_expert.yaml), иначе κ auto↔expert неизмеримо.
#
# Гейтинг: нет инструмента оси (поле instrument) → ось НЕ измерена для прогона и
# исключается из Q как N/A — НЕ ставится 0.

protocol:
  level: 1
  name: auto
  constitution: metrics/smop.yaml

axes:

  S:
    measures: компилируется ли модуль
    instrument:
      A: BSL Language Server (статический парсер)
      B: компилятор 1С (DESIGNER /CheckModules -Server) — ошибки только модуля кандидата
    signal:
      count: корневые причины = кластеры ParseError + compile-блокеры
      cluster_rule: соседние ParseError в пределах cluster_gap строк считаются одной причиной
    excludes:
      - предупреждения и стандарты (DeprecatedCurrentDate и т.п.) → ось O
    pre_check:                          # минует таблицу, отдаёт 0 напрямую
      rule: дисбаланс парности (Функция/КонецФункции, Если, Цикл, Попытка) → S=0
      why: ловит обрезанную генерацию, которую парсер молча пропускает
    scoring:
      unit: корневые причины
      direction: lower_is_better
      table:
        - { bound: 0, score: 10 }       # без ошибок
        - { bound: 1, score: 8 }        # одна причина
        - { bound: 3, score: 6 }        # 2–3
        - { bound: 6, score: 4 }        # 4–6
        - { else: true, score: 2 }      # больше 6
    cluster_gap: 3
    compile_blocker_codes: [ProcedureReturnsValue]   # не-ParseError диагностики «не скомпилируется»

  M:
    measures: соответствие логики требованиям — исполнением скрытых тестов
    instrument:
      A: OneScript 2.0
      B: 1С + YAXUNIT
    signal:
      share: доля прошедших тестов passed/total
      floor: не скомпилировался / не исполнился → 0 (нет подтверждённого смысла)
    scoring:
      unit: доля прошедших тестов
      direction: higher_is_better
      table:
        - { bound: 1.00, score: 10 }                  # 100%
        - { bound: 0.85, score: 8 }                   # ≥ 85%
        - { bound: 0.60, score: 6 }                   # ≥ 60%
        - { bound: 0.50, score: 4 }                   # ≥ 50%
        - { bound: 0.0, exclusive: true, score: 2 }   # > 0%
        - { else: true, score: 0 }                    # 0% или не исполнился

  O:
    measures: отсутствие механических perf/арх-антипаттернов (O-авто)
    coverage: только O-авто; архитектурная оптимальность (O-арх) — Уровень 2 протокола
    instrument: BSL LS — белый список perf/арх-диагностик
    signal:
      weight: взвешенная сумма сработавших диагностик из white_list
      excludes: стилевой шум (MagicNumber, LineLength) — сознательно вне S и O (антикоррелировал с экспертом)
    white_list:                         # код диагностики BSL LS → вес вклада
      VirtualTableCallWithoutParameters: 2.0
      JoinWithVirtualTable: 2.0
      JoinWithSubQuery: 1.5
      QueryNestedFieldsByDot: 1.0
      DeprecatedCurrentDate: 1.0
      SelectTopWithoutOrderBy: 1.0
      QueryToMissingMetadata: 2.0
    scoring:
      unit: суммарный вес антипаттернов
      direction: lower_is_better
      floor_note: машина не опускает O ниже 2 — считает лишь ограниченный список (честный предел инструмента)
      table:
        - { bound: 0, score: 10 }       # чисто
        - { bound: 1, score: 8 }        # ≤ 1
        - { bound: 3, score: 6 }        # ≤ 3
        - { bound: 6, score: 4 }        # ≤ 6
        - { else: true, score: 2 }      # > 6

  P:
    status: provisional
    applies_to: [B]                     # для категории A = N/A (см. конституцию)
    measures: корректность обращений к объектам метаданных платформы
    instrument: сверка обращений со схемой синтетической конфигурации (+ исполнение для надёжной формы)
    signal:
      errors: несуществующий объект/реквизит + нарушение суффикса ВТ Остатки (ВНаличии vs ВНаличииОстаток)
      recall: доля использованных ожидаемых объектов
    pre_check:
      rule: ни одного реального объекта (структура вымышлена) → P=0
    scoring:
      unit: ошибки метаданных
      direction: lower_is_better
      recall_rule: балл 10 требует ещё и полного recall; потеря ожидаемых объектов опускает 10 → 8
      table:
        - { bound: 0, score: 10 }       # 0 ошибок, все ожидаемые объекты использованы
        - { bound: 1, score: 8 }        # 1 ошибка ИЛИ 0 ошибок, но потеряны ожидаемые
        - { bound: 2, score: 6 }        # 2 ошибки
        - { bound: 4, score: 4 }        # 3–4 ошибки
        - { else: true, score: 2 }      # > 4 ошибок

meta:
  version: "1.0.0"
  description: Протокол автоматической оценки SMOP (Уровень 1)
  author: Андреев Д.С.
