# SMOP — ПРОТОКОЛ УРОВНЯ 1 (автоматическая оценка, оракулы)
# Здесь — только «КАК машина выводит балл».
# Значения совпадают по шкале с L2 (metrics/smop_l2_expert.yaml), иначе согласие L1↔L2
# (κ auto↔expert) неизмеримо. Пороги — стартовая калибровка, уточняются на данных.

protocol:
  level: 1
  name: auto
  constitution: metrics/smop.yaml

axes:
  S:
    instrument:
      A: "BSL Language Server (статический парсер)"
      B: "компилятор 1С (DESIGNER /CheckModules -Server) — ошибки только модуля кандидата"
    pre_check: "структурная парность (Функция/КонецФункции, Если, Цикл, Попытка) — дисбаланс → S=0 (ловит обрезанную генерацию, которую парсер пропускает)"
    signal: "число корневых причин = кластеры ParseError (сообщения ≤3 строк = одна причина) + compile-блокеры (ProcedureReturnsValue)"
    excludes: "предупреждения/стандарты (DeprecatedCurrentDate и т.п.) НЕ в S → учитываются в O"
    reachable_scores: [0, 2, 4, 6, 8, 10]
    bands:
      10: "0"
      8:  "1"
      6:  "2–3"
      4:  "4–6"
      2:  ">6"
      0:  "нарушена парность конструкций (структура разрушена)"

  M:
    instrument:
      A: "OneScript 2.0 (исполнение скрытых тестов)"
      B: "1С + YAXUNIT (исполнение скрытых тестов)"
    signal: "доля прошедших тестов passed/total"
    note: "execution-based: не скомпилировался / не исполнился → 0 (нет подтверждённого смысла)"
    reachable_scores: [0, 2, 4, 6, 8, 10]
    bands:
      10: "100%"
      8:  "≥85%"
      6:  "≥60%"
      4:  "≥50%"
      2:  ">0%"
      0:  "0% или не исполнился"

  O:
    coverage: "только O-авто (механические антипаттерны). O-арх (архитектура) — Уровень 2."
    instrument: "BSL LS — белый список perf/арх-диагностик (стилевой шум MagicNumber/LineLength исключён: антикоррелировал с экспертом)"
    signal: "взвешенная сумма сработавших диагностик из белого списка"
    weights:
      VirtualTableCallWithoutParameters: 2.0
      JoinWithVirtualTable: 2.0
      JoinWithSubQuery: 1.5
      QueryNestedFieldsByDot: 1.0
      DeprecatedCurrentDate: 1.0
      SelectTopWithoutOrderBy: 1.0
      QueryToMissingMetadata: 2.0
    # машина не даёт O=0: считает лишь ограниченный список (честный предел инструмента)
    reachable_scores: [2, 4, 6, 8, 10]
    bands:
      10: "w = 0"
      8:  "w ≤ 1"
      6:  "w ≤ 3"
      4:  "w ≤ 6"
      2:  "w > 6"

  P:
    # для категории A = N/A (см. конституцию)
    applies_to: [B]
    status: provisional
    instrument: "сверка обращений к метаданным со схемой синтетической конфигурации"
    signal: "ошибки метаданных = несуществующий объект/реквизит + нарушение правила суффикса ВТ Остатки (ВНаличии vs ВНаличииОстаток); + recall ожидаемых объектов"
    reachable_scores: [0, 2, 4, 6, 8, 10]
    bands:
      10: "0 ошибок, все ожидаемые объекты использованы"
      8:  "0 ошибок, но потеряны ожидаемые объекты ИЛИ 1 ошибка"
      6:  "2 ошибки"
      4:  "3–4 ошибки"
      2:  ">4 ошибок"
      0:  "структура полностью вымышлена (ни одного реального объекта)"

# Гейтинг: ось считается только при наличии инструмента (BSL LS / OneScript / платформа 1С).
# Нет инструмента → ось не измерена для прогона и исключается из Q (как N/A), а не ставится 0.
gating:
  S: "BSL LS (кат. A) / компилятор 1С (кат. B)"
  M: "OneScript (кат. A) / платформа 1С + YAXUNIT (кат. B)"
  O: "BSL LS"
  P: "схема синтетической конфигурации (+ исполнение для надёжной формы)"

meta:
  version: "1.0.0"
  description: "Протокол автоматической оценки SMOP (Уровень 1)"
  author: "Андреев Д.С."
