# SMOP — ПРОТОКОЛ УРОВНЯ 2 (экспертная оценка человеком):
# «КАК человек ставит балл».
# Текстовые критерии 0–10 по каждой оси (единственный источник; машинной копии нет).
# Достижимые баллы оси = ключи её criteria. Дисциплина оценки:
#  - ставь по каждой оси ТОЛЬКО её предмет: S — компилируемость; имена метаданных → P;
#    ошибки логики → M; отклонения от стандартов → O;
#  - оценивай ВСЛЕПУЮ к авто-баллу L1 — иначе согласие L1↔L2 (κ auto↔expert) завысится.

protocol:
  level: 2
  name: expert
  constitution: metrics/smop.yaml

axes:

  S:
    criteria:
      10: "Компилируется без ошибок"
      8:  "Компилируется после одной тривиальной правки (1 опечатка/имя)"
      6:  "Компилируется после 2–3 правок"
      4:  "Требуется исправить 4–6 синтаксических ошибок"
      2:  "Более 6 ошибок, но общая структура кода понятна"
      0:  "Не компилируется / структура разрушена"

  M:
    criteria:
      10: "Код полностью выполняет задачу, все требования реализованы"
      8:  "Основная логика верна, не выполнено одно второстепенное требование"
      6:  "Основная логика верна, не реализованы 2–3 требования или краевые случаи"
      4:  "Реализована только часть требуемой логики (более 50%)"
      2:  "Реализовано менее 50% требуемой логики"
      0:  "Код не выполняет поставленную задачу"

  O:
    criteria:
      10: "Соответствует стандартам разработки 1С, оптимален по производительности"
      8:  "Незначительные отклонения от стандартов, не влияющие на производительность"
      6:  "Работоспособен, но есть явные возможности оптимизации"
      4:  "Неэффективные решения: запросы в цикле, избыточные обращения к БД"
      2:  "Множественные антипаттерны, код будет работать неприемлемо медленно"
      0:  "Критические проблемы производительности или архитектуры решения"

  P:
    applies_to: [B]                   # для категории A = N/A (см. конституцию)
    criteria:
      10: "Все объекты метаданных и методы платформы использованы корректно"
      8:  "1–2 неточности в именах реквизитов или методов, легко исправимые"
      6:  "Ошибки в работе с типами данных или структурой объектов конфигурации"
      4:  "Несуществующие реквизиты/регистры/методы (до 30% обращений)"
      2:  "Более 30% обращений к несуществующим объектам метаданных или методам"
      0:  "Код построен на полностью вымышленной структуре конфигурации"

meta:
  version: "1.0.0"
  description: Протокол экспертной оценки SMOP (Уровень 2)
  author: Андреев Д.С.
