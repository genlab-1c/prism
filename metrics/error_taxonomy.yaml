# Справочник типов ошибок генерации — для воронки отказа (prism leaderboard --full).
#
# Воронка не считает баллы. Она классифицирует, ГДЕ и КАК умирает прогон:
#   разбор → запуск → верно (см. harness/stats/funnel.py).
# Здесь — словарь «текст ошибки → код», чтобы назвать причину смерти человеческим
# словом. Данные не в коде: правила тут, классификатор их читает.
#
# Как работает: причина смерти берётся из detail.* прогона (сырые сообщения 1С/
# OneScript), и первое правило с совпавшим `match`-фрагментом (подстрока, регистр
# важен) даёт код. Порядок важен — частное выше общего. Не совпало ни одно правило —
# корзина `default_*` ниже (видимая, не молчаливая): пухнет — пополнить словарь.
#
# Платформенные ошибки (кат. B) ловятся не текстом, а структурой
# (detail.M.platform_errors) — для них код P.METADATA проставляется в коде воронки.

version: "0.1.0"

# Правила классификации по фрагменту текста. axis — к какой оси SMOP тяготеет
# причина (для будущей тепловой карты); label — что печатать в колонке «причина».
rules:
  # — синтаксис / компиляция —
  - code: S.COMPILE
    axis: S
    label: "ошибка синтаксиса"
    match: ["Пропущен символ", "Ожидается символ", "Неопознанный оператор",
            "Identifier expecting", "Expecting symbol", "Unexpected"]

  # — точка входа —
  - code: M.NOENTRY
    axis: M
    label: "нужной функции нет"
    match: ["не найдено ни одной фун", "no entry", "точка входа"]

  # — типы (молчаливо неверный путь: код позвал не то / не так) —
  - code: M.TYPE
    axis: M
    label: "перепутаны типы данных"
    match: ["Несоответствие типов", "Conversion to type", "Invalid type of argument",
            "Value is not of object type", "is not writable", "Преобразование к типу"]

  # — обращение к несуществующему методу/типу —
  - code: M.NOMETHOD
    axis: M
    label: "вызов несуществующего метода"
    match: ["Method not found", "Метод объекта не обнаружен", "Метод не найден"]
  - code: M.NOTYPE
    axis: M
    label: "обращение к несуществующему типу"
    match: ["Type is not defined", "Тип не определён"]

  # — индексы / границы / прочий рантайм с явным исключением —
  - code: M.RUNTIME
    axis: M
    label: "сбой при выполнении"
    match: ["Index", "Индекс", "за границами", "out of", "Деление на 0", "ИСКЛЮЧЕНИЕ",
            "Error in line", "Ошибка при вызове"]

# Корзины по умолчанию (ничего не совпало) — держим видимыми.
defaults:
  parse:   { code: S.PARSE, axis: S, label: "ошибка синтаксиса" }     # умер на разборе
  run:     { code: M.RUNTIME, axis: M, label: "сбой при выполнении" } # умер на запуске
  noentry: { code: M.NOENTRY, axis: M, label: "нужной функции нет" }   # точка входа не найдена
  wrong: { code: M.WRONG, axis: M, label: "результат не тот" }   # дожил, но тесты не прошли
  meta:  { code: P.METADATA, axis: P, label: "нет такого поля или объекта" } # платформенная (по структуре)
