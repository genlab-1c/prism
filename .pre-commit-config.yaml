# Прехуки PRISM. Установка: pre-commit install (ставит и pre-commit, и commit-msg хуки).
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # Ruff: автофикс линта + формат перед коммитом. Локальные хуки через `uv run` —
  # тот же ruff, что в make lint / CI (без version-skew с пиновым mirror-репо).
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check --fix
        entry: uv run ruff check --fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true

  # Проверка формата сообщения коммита (Conventional Commits, правила в .cz.toml)
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.3
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Базовая гигиена файлов перед коммитом.
  # results/ — канонический снимок эксперимента (промпты, ответы, разметка): форматтеры
  # его НЕ трогают, иначе байтовый дрейф данных. check-yaml/конфликты безопасны везде.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace      # лишние пробелы в конце строк
        exclude: ^results/
      - id: end-of-file-fixer        # перевод строки в конце файла
        exclude: ^results/
      - id: check-yaml               # валидность YAML (editions/, metric/, tasks/)
      - id: check-merge-conflict     # забытые маркеры конфликтов
      - id: check-added-large-files  # случайные большие файлы (>500 КБ)
