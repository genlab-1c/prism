name: docs

# Сборка сайта документации (MkDocs Material) и публикация на GitHub Pages.
# Триггеры: изменения в docs/ или конфиге, плюс ручной запуск.
on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs.yml
  workflow_dispatch:

# Права для нативного деплоя Pages через OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой за раз; идущий не прерываем.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Установка MkDocs Material
        run: pip install "mkdocs-material>=9.5"
      - name: Сборка сайта
        run: mkdocs build
      - uses: actions/configure-pages@v5
        with:
          enablement: true   # включить Pages автоматически на первом прогоне (если ещё не включён)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
