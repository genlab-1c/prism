name: docs

# Проверочная сборка документации MkDocs (Material). НЕ публикует на GitHub Pages:
# сайт публикует deploy.yml (Astro, web/). Здесь только валидация, что docs/ собирается.
on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Системные библиотеки для соцкарточек (Cairo/шрифты)
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev
      - name: Установка MkDocs Material
        run: pip install "mkdocs-material[imaging]>=9.5"
      - name: Сборка сайта (проверка, без публикации)
        run: mkdocs build
