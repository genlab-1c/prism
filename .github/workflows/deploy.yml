# Сборка и публикация витрины (web/) на GitHub Pages.
# Источник Pages в настройках репозитория должен быть «GitHub Actions».
# Кастомный домен — через web/public/CNAME (prism.genlab-1c.ru), сертификат
# Pages выпускает сам (Let's Encrypt) после привязки домена в Settings → Pages.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    # пересобираем, когда меняется витрина или данные, из которых она строится
    paths:
      - 'web/**'
      - 'results/**'
      - 'generation/**'
      - 'docs/**'
      - 'tasks/**'
      - 'README.md'
      - 'pyproject.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# не запускать параллельные деплои; новый отменяет предыдущий
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # npm run build = npm run data (build-data + sync-docs) + npm run og + astro build
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
