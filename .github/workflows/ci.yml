name: CI

# Fast-ярус: на каждый push и PR. Линт + гигиена + юнит-тесты без инструментов.
# Интеграционные тесты (M через OneScript, S/O через BSL LS) и когерентность эталонов
# гейтятся skipif по наличию инструмента — здесь их нет, поэтому они сами пропускаются.
# Тяжёлый full-ярус (с инструментами в образе prism-tools) добавим отдельно.
#
# Окружение ставит uv (astral-sh/setup-uv): `uv sync` собирает .venv из pyproject.toml
# (рантайм + dev-группа), `uv run` запускает инструменты в нём. См. Makefile / docs/cli.md.

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: lint + unit (без инструментов)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка uv (+ кеш зависимостей)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Синхронизация окружения (пакет + dev-группа)
        run: uv sync

      - name: Кеш окружений pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Ruff (линт)
        run: uv run ruff check .

      - name: Ruff format (проверка форматирования)
        run: uv run ruff format --check .

      - name: Гигиена файлов (pre-commit; commitizen — стадия commit-msg, здесь не запускается)
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Юнит-тесты + покрытие (интеграция M/S/O скипнется — инструментов нет)
        run: uv run pytest -q --cov=harness --cov-report=term
