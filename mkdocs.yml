site_name: PRISM
site_description: Исполняемый бенчмарк кодогенерации 1С (методика SMOP — Syntax · Meaning · Optimization · Platform)
site_url: https://prism.genlab-1c.ru/
repo_url: https://github.com/genlab-1c/prism
docs_dir: docs
use_directory_urls: true

plugins:
  - search                # встроенный поиск (по умолчанию активен; при явном plugins его надо указать)
  - social                # авто-генерация og:image-карточек для соцсетей и SEO (требует mkdocs-material[imaging])

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      toggle: { icon: material/weather-night, name: Тёмная тема }
    - scheme: slate
      primary: indigo
      toggle: { icon: material/weather-sunny, name: Светлая тема }
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html        # рендерить markdown-таблицы внутри <div align="center"> (как на GitHub)
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid          # диаграммы Mermaid (встроены в Material) — ```mermaid ... ```
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite

nav:
  - Обзор: index.md
  - Лидерборд: leaderboard.md
  - Как это работает: how-it-works.md
  - Что умеет сейчас: status.md
  - Честные границы: validity.md
  - Как запустить: cli.md
  - Как участвовать: https://github.com/genlab-1c/prism/blob/main/CONTRIBUTING.md
  - Архитектура: architecture.md
