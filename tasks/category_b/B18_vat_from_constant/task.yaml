# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Чтение КОНСТАНТЫ + выделение НДС «в том числе» (обратный
# расчёт): сумма уже включает налог. Наивная формула «сверху» (×Ставка/100) даёт неверно.
id: B18
name: Выделить НДС из суммы с налогом
category: B
difficulty: medium
# O: статика — задача точечная (O(1)); запрос-в-цикле построить нельзя, оптимизировать нечего (нет perf.yaml).

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["\\w*ВыделитьНДС\\w*", "\\w*НДС\\w*", "\\w*Налог\\w*"]

prompt: |
  В конфигурации есть константа «СтавкаНДС» (число, ставка в процентах).

  Написать функцию: по переданной сумме, которая УЖЕ ВКЛЮЧАЕТ НДС (сумма «с НДС»),
  выделить и вернуть сумму самого НДС, по ставке из этой константы. Ставку брать из
  константы, не зашивать.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - Константа.СтавкаНДС

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [метаданные, числа]
  platform: [константа]
