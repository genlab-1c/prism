# Фикстуры B18 — значение константы. Ставка 20% даёт круглые числа для проверки, но
# ловушка в ФОРМУЛЕ: НДС «в том числе» = Сумма × Ставка / (100 + Ставка), а не / 100.

constants:
  СтавкаНДС: 20

# Ожидания (проверки в tests.bsl), сумма включает НДС, ставка 20%:
#   1200 → 200  (1200·20/120; наивно «сверху» 1200·20/100 = 240);
#   6000 → 1000 (6000·20/120);
#    360 → 60   (360·20/120).
