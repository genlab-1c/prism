# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Подчинённый справочник (Договоры↔Контрагенты) + ИНТЕРВАЛЬНАЯ
# логика дат: договор, действующий НА дату. Пустая дата окончания = бессрочный (ловушка).
id: B16
name: Договор, действующий на дату
category: B
difficulty: hard

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["\\w*Действующий\\w*", "\\w*Договор\\w*Дат\\w*", "\\w*Договор\\w*"]

prompt: |
  Справочник «Договоры» подчинён справочнику «Контрагенты» (у договора есть
  владелец-контрагент). У договора есть реквизиты ДатаНачала (дата) и ДатаОкончания
  (дата). Договор считается действующим на некоторую дату, если ДатаНачала не позже
  этой даты, а ДатаОкончания не раньше этой даты. ДатаОкончания может быть НЕ ЗАПОЛНЕНА
  — это бессрочный договор (действует с ДатаНачала и далее без ограничения).

  Написать функцию: по ссылке на контрагента и дате среза вернуть ссылку на его
  договор, действующий на эту дату, с самой поздней ДатаНачала. Если действующих на
  эту дату договоров нет — вернуть Неопределено.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - Справочник.Контрагенты
  - Справочник.Договоры

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные, даты]
  platform: [подчинённый-справочник]
