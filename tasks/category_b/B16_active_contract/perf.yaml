# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим подчинённый справочник Договоры: +N договоров
# ОДНОГО контрагента (ООО Альфа), считаем обращения кандидата к данным (техжурнал 1С). См.
# harness/score/optimization_b_exec.py.
# Эталон берёт нужный договор ОДНИМ запросом (отбор Владелец=&Контрагент + интервал дат в ГДЕ,
# ПЕРВЫЕ 1, УПОРЯДОЧИТЬ ПО ДатаНачала УБЫВ) → одно обращение к СУБД независимо от числа договоров
# (p≈0). Порок наива — «чтение реквизита через ссылку в цикле»: выбрать только ссылки договоров,
# а затем в цикле по каждой читать ДоговорСсылка.ДатаНачала/.ДатаОкончания через точку → читает
# ОБЪЕКТ каждого из N договоров отдельным обращением → число обращений растёт ~линейно (p≈1).
p_opt: 0.0
sizes: [20, 80]              # число синтетических договоров ОДНОГО контрагента (ООО Альфа)
count: sdbl                  # регистров в задаче нет (register → нули → ось не измерена); порок наива —
                             # чтение объекта каждого договора (.ДатаНачала через точку в цикле) = логич. SDBL
grow:
  name_prefix: ПерфДоговор
  # +N договоров контрагента К1 (ООО Альфа), все действующие на срез: ДатаНачала=2025-01-01,
  # ДатаОкончания не заполнена → бессрочные. Справочник Договоры подчинён Контрагентам (owner из
  # fixtures — тот же ref К1, что уже используется в fixtures.yaml).
  catalog: { name: Договоры, owner: К1, attrs: { ДатаНачала: 2025-01-01 } }
# замерочный вызов: контрагент «ООО Альфа» (все N синтетических договоров — его, работа разгуляется)
# + дата, на которую все они действуют. Эталон — один запрос (плоско, O10); наив, читающий
# .ДатаНачала/.ДатаОкончания по каждой из N ссылок в цикле, обращается к СУБД ~N раз (рост, O4).
call: 'КодКандидата.{{ENTRY}}(Спр("Контрагенты", "ООО Альфа"), Дата(2025, 6, 15))'
