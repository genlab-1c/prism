# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Регистр бухгалтерии С СУБКОНТО (ПВХ): оборот в разрезе
# контрагента, у которого ПОЗИЦИЯ субконто на разных счетах РАЗНАЯ (ловушка хардкода СубконтоДт1).
id: B20
name: Оборот по счёту в разрезе субконто
category: B
difficulty: hard

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["\\w*ОборотПоСубконто\\w*", "\\w*Субконто\\w*", "\\w*Оборот\\w*"]

prompt: |
  План счетов «Основной» ведёт аналитику (субконто) через план видов характеристик
  «ВидыСубконто». У счёта может быть несколько субконто, и их ПОРЯДОК на разных счетах
  разный: на счёте 62 субконто (Контрагент, Договор), на счёте 76 — (Договор, Контрагент).
  Регистр бухгалтерии «Хозрасчетный» (с корреспонденцией); субконто проводки доступны в
  виртуальной таблице «.ДвиженияССубконто» полями СубконтоДт1, СубконтоДт2.

  Написать функцию: по ссылке на счёт и ссылке на контрагента вернуть дебетовый оборот
  по этому счёту в разрезе этого контрагента (сумма проводок, где счёт стоит по дебету,
  а контрагент фигурирует как субконто дебета — НЕЗАВИСИМО от позиции субконто; при
  нескольких других субконто свернуть по контрагенту). Если таких проводок нет — вернуть 0.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - РегистрБухгалтерии.Хозрасчетный
  - ПланСчетов.Основной
  - ПланВидовХарактеристик.ВидыСубконто

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные, числа]
  platform: [регистр-бухгалтерии, план-счетов, план-видов-характеристик]
