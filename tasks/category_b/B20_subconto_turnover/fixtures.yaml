# Фикстуры B20 — виды субконто (Контрагент, Договор), счета с РАЗНЫМ порядком субконто
# и проводки с двумя субконто. Ловушки:
#  - на счёте 62 контрагент — субконто №1, на счёте 76 — субконто №2 (обратный порядок):
#    наивный хардкод СубконтоДт1 = &Контрагент на 76 ловит договор → 0;
#  - у контрагента на счёте 62 две проводки с разными договорами → нужно свернуть по
#    контрагенту (не фильтровать по договору).

catalogs:
  Контрагенты:
    - {ref: К1, Наименование: "ООО Альфа"}
    - {ref: К2, Наименование: "ООО Бета"}
  Договоры:
    - {ref: Д1, Наименование: "Д-100"}
    - {ref: Д2, Наименование: "Д-200"}

characteristics:
  ВидыСубконто:
    - {ref: ВС_Контр, Наименование: "Контрагент", ТипЗначения: "СправочникСсылка.Контрагенты"}
    - {ref: ВС_Дог,   Наименование: "Договор",    ТипЗначения: "СправочникСсылка.Договоры"}

accounts:
  Основной:
    - {ref: А90, Код: "90", Наименование: "Продажи", Вид: АктивноПассивный}
    # счёт 62: порядок субконто (Контрагент, Договор)
    - {ref: А62, Код: "62", Наименование: "Расчёты с покупателями", Вид: АктивноПассивный, subconto: [ВС_Контр, ВС_Дог]}
    # счёт 76: ОБРАТНЫЙ порядок (Договор, Контрагент)
    - {ref: А76, Код: "76", Наименование: "Расчёты с разными дебиторами", Вид: АктивноПассивный, subconto: [ВС_Дог, ВС_Контр]}

accounting_records:
  Хозрасчетный:
    registrar: Операция
    records:
      # счёт 62: К1 по двум договорам + К2
      - {Период: 2025-01-10, СчетДт: А62, СчетКт: А90, Сумма: 1000, СубконтоДт: {ВС_Контр: К1, ВС_Дог: Д1}}
      - {Период: 2025-01-20, СчетДт: А62, СчетКт: А90, Сумма: 500,  СубконтоДт: {ВС_Контр: К1, ВС_Дог: Д2}}
      - {Период: 2025-02-01, СчетДт: А62, СчетКт: А90, Сумма: 700,  СубконтоДт: {ВС_Контр: К2, ВС_Дог: Д1}}
      # счёт 76: контрагент на ВТОРОЙ позиции субконто
      - {Период: 2025-02-10, СчетДт: А76, СчетКт: А90, Сумма: 300,  СубконтоДт: {ВС_Дог: Д1, ВС_Контр: К1}}

# Ожидания (проверки в tests.bsl):
#   (счёт 62, К1) → 1500 (1000+500 по двум договорам — свернуть по контрагенту);
#   (счёт 76, К1) → 300  (контрагент на позиции №2; наивный СубконтоДт1=&К даёт 0);
#   (счёт 62, К2) → 700.
