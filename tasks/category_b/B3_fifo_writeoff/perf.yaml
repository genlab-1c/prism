# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим базу партиями, считаем обращения кандидата
# к данным (техжурнал 1С), сравниваем класс роста с p_opt эталона. См.
# harness/score/optimization_b_exec.py.
# Эталон берёт остатки ВСЕХ партий одним запросом (виртуальная таблица .Остатки) и сортирует
# партии по дате ВНУТРИ запроса (УПОРЯДОЧИТЬ ПО Остатки.Партия.Дата — join к документу решает
# сервер за один поход) → число обращений к СУБД не растёт с числом партий (p≈0).
p_opt: 0.0
sizes: [20, 80]              # число синтетических партий (документов-регистраторов) на 1 товар
count: sdbl                  # ВАЖНО: НЕ register. Порок наива — обращение к реквизиту партии
                             # (Партия.Дата) через точку в цикле для сортировки — читает таблицу
                             # ДОКУМЕНТА-регистратора, а не физтаблицу регистра; register этого
                             # не увидит (плоско, ложный O10), sdbl ловит рост чтений документа.
grow:
  name_prefix: ПерфПартия
  # + N партий ОДНОГО товара (Холодильник X) на одном складе; catalog не нужен — товар уже в
  # fixtures. Каждая запись = свой документ-регистратор ПоступлениеТоваров ($регистратор) →
  # N РАЗЛИЧИМЫХ партий в остатках (измерение Партия = ссылка на документ поступления).
  accumulation:
    register: ПартииТоваровНаСкладах
    registrar: ПоступлениеТоваров
    record: { Склад: Основной, Номенклатура: Холодильник, Партия: $регистратор, Количество: 10, Стоимость: 1000, Период: 2026-03-01 }
# замерочный вызов: списать 50 шт Холодильника (< суммарного остатка 30 + N*10 при любом N из
# sizes → списание проходит без исключения, прогон состоялся). Кандидат обязан упорядочить ВСЕ
# партии по дате: эталон — в запросе (1 поход, плоско); наив, сортируя выгруженные партии по
# Партия.Дата обращением через точку, читает документ каждой из N партий → рост ~линейный.
# ТаблицаТоваров (колонки Номенклатура, Количество) строится тут же — литералом её не передать.
call: 'Т = Новый ТаблицаЗначений; Т.Колонки.Добавить("Номенклатура"); Т.Колонки.Добавить("Количество"); СтрТ = Т.Добавить(); СтрТ.Номенклатура = Спр("Номенклатура", "Холодильник X"); СтрТ.Количество = 50; КодКандидата.{{ENTRY}}(Т, Спр("Склады", "Основной склад"))'
