# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации.
id: B3
name: Списание товаров по FIFO
category: B
difficulty: hard

entry_point_patterns: ["Списа\\w*", "\\w*FIFO\\w*", "Распредел\\w*"]

prompt: |
  Написать функцию списания товаров со склада методом FIFO.
  Параметры: таблица товаров к списанию (колонки Номенклатура, Количество), склад.
  Остатки хранятся в партионном регистре, партия — документ поступления;
  более ранняя партия списывается первой (по дате партии).
  Вернуть таблицу распределения с колонками: Номенклатура, Партия,
  Количество (списано из партии), Стоимость (по цене партии);
  строки — в порядке списания партий.
  При недостатке остатков вызвать исключение, текст которого содержит
  наименование проблемной номенклатуры.

expected_objects:
  - РегистрНакопления.ПартииТоваровНаСкладах
  - Справочник.Номенклатура
  - Справочник.Склады
  - Документ.ПоступлениеТоваров
