# Фикстуры B3 — две партии с разными датами и ценами → детерминированное FIFO.
# «$регистратор» в поле Партия → ссылка на документ-регистратор записи (он и есть партия).

catalogs:
  Склады:
    - {ref: Основной, Наименование: "Основной склад"}
  Номенклатура:
    - {ref: Холодильник, Наименование: "Холодильник X"}
    - {ref: Болт, Наименование: "Болт М6"}   # без остатков → исключение при списании

register_records:
  ПартииТоваровНаСкладах:
    registrar: ПоступлениеТоваров
    records:
      # партия 1 (раньше): 10 шт по 100
      - {Период: 2026-01-10, Склад: Основной, Номенклатура: Холодильник,
         Партия: $регистратор, Количество: 10, Стоимость: 1000}
      # партия 2 (позже): 20 шт по 300 — цены партий несимметричны,
      # чтобы проверка стоимостей различала партии сама по себе
      - {Период: 2026-02-10, Склад: Основной, Номенклатура: Холодильник,
         Партия: $регистратор, Количество: 20, Стоимость: 6000}

expected:
  fifo_15:       # списать 15: 10 из партии-1 (10·100=1000) + 5 из партии-2 (5·300=1500)
    строк: 2
    количества: [10, 5]
    стоимости: [1000, 1500]
  shortage_50:   # списать 50 (> 30 на остатке) → исключение с именем номенклатуры
    exception: true
    contains: "Холодильник"
