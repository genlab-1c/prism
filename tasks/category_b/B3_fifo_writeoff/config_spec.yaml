# Синтетическая конфигурация под B3: партионный регистр, партия — ссылка на
# документ поступления (порядок FIFO — по дате партии).

catalogs:
  Номенклатура:
    hierarchical: false
  Склады:
    hierarchical: false

documents:
  ПоступлениеТоваров:
    registers: [ПартииТоваровНаСкладах]

accumulation_registers:
  ПартииТоваровНаСкладах:
    register_type: Balance
    dimensions:
      Склад: { type: СправочникСсылка.Склады }
      Номенклатура: { type: СправочникСсылка.Номенклатура }
      Партия: { type: ДокументСсылка.ПоступлениеТоваров }
    resources:
      Количество: { type: Число, length: 15, precision: 3 }
      Стоимость: { type: Число, length: 15, precision: 2 }
