# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации
# (плоским текстом или агентным поиском) — не зашита в этот промпт.
id: B9
name: Свод табличной части документа
category: B
difficulty: medium

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["Сверн\\w*", "\\w*Свод\\w*", "Сгруппир\\w*"]

prompt: |
  Написать функцию свода табличной части «Товары» документа.
  Параметр: ссылка на документ.
  Вернуть таблицу значений с колонками Номенклатура, Количество, Сумма,
  где строки с одинаковой номенклатурой объединены, а количество и сумма
  просуммированы. По одной строке на номенклатуру.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - Документ.ЗаказПокупателя
  - Справочник.Номенклатура

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные, коллекции]
  platform: [табличная-часть]
