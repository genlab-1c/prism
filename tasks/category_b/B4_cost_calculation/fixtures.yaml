# Фикстуры B4 — партии с разной ценой → известная средневзвешенная.
# Даты партий разнесены: проверяется и граница даты (поздняя партия не должна
# попадать в расчёт на раннюю дату).

catalogs:
  Склады:
    - {ref: Основной, Наименование: "Основной склад"}
  Номенклатура:
    - {ref: Холодильник, Наименование: "Холодильник X"}
    - {ref: Болт, Наименование: "Болт М6"}

register_records:
  СтоимостьТоваров:
    registrar: ПоступлениеТоваров
    records:
      # 10 шт по 100 + 30 шт по 200 → на 2026-03-01 средняя (1000+6000)/40 = 175
      - {Период: 2026-01-10, Склад: Основной, Номенклатура: Холодильник, Количество: 10, Стоимость: 1000}
      - {Период: 2026-02-10, Склад: Основной, Номенклатура: Холодильник, Количество: 30, Стоимость: 6000}
      # поздняя партия: 10 шт по 500 → на 2026-07-01 средняя (7000+5000)/50 = 240
      - {Период: 2026-06-01, Склад: Основной, Номенклатура: Холодильник, Количество: 10, Стоимость: 5000}

expected:
  early_date:   # на 2026-03-01: две партии → 175; Болт без остатков → 0
    Холодильник: 175
    Болт: 0
  late_date:    # на 2026-07-01: три партии → 240
    Холодильник: 240
