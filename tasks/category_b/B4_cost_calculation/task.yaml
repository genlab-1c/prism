# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации.
id: B4
name: Расчёт себестоимости продажи
category: B
difficulty: medium

entry_point_patterns: ["Рассчит\\w*Себестоимост\\w*", "\\w*Себестоимост\\w*", "Средн\\w*"]

prompt: |
  Написать функцию расчёта себестоимости товаров методом
  средневзвешенной стоимости.
  Параметры: массив номенклатуры, склад, дата.
  Вернуть таблицу со средней ценой по каждой позиции
  на основании остатков партий (средняя = стоимость остатка / количество остатка).
  Для позиций без остатков средняя цена — ноль.

expected_objects:
  - РегистрНакопления.ПартииТоваров
  - Справочник.Номенклатура
  - Справочник.Склады
