# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим базу, считаем обращения кандидата к данным
# (техжурнал 1С), сравниваем класс роста с p_opt эталона. См. harness/score/optimization_b_exec.py.
# Эталон берёт остатки ВСЕХ запрошенных позиций ОДНИМ запросом к виртуальной таблице
# СтоимостьТоваров.Остатки с отбором «Номенклатура В (&МассивНоменклатуры)» → одно обращение к
# СУБД независимо от размера базы (p≈0). Порок наива — запрос .Остатки на КАЖДУЮ позицию массива в
# цикле → число обращений растёт линейно с числом переданных позиций (p≈1).
p_opt: 0.0
sizes: [20, 80]              # сколько синтетических «единиц» (товар + стоимостной остаток) добавить
# count: sdbl               # (по умолчанию) все логические обращения к данным; и эталон (1 запрос),
                            # и наив (запрос .Остатки в цикле по позиции) — чтения регистра, sdbl их ловит
grow:
  name_prefix: ПерфТовар
  catalog: { name: Номенклатура }                            # +N товаров (плоско, листья — параметр отбора)
  accumulation:                                              # + стоимостной остаток на каждый товар
    register: СтоимостьТоваров
    registrar: ПоступлениеТоваров
    record: { Склад: Основной, Номенклатура: "$unit", Количество: 10, Стоимость: 1000, Период: 2026-01-01 }
# замерочный вызов: собираем МАССИВ всех N+2 позиций запросом (в контексте Тесты — кандидату НЕ
# атрибутируется) и передаём его кандидату. Эталон посчитает их одним запросом (плоско, O10); наив,
# делая .Остатки на каждую позицию в цикле, обратится к СУБД ~N раз (линейный рост, O4).
call: 'Запрос = Новый Запрос("ВЫБРАТЬ Ссылка ИЗ Справочник.Номенклатура ГДЕ НЕ ЭтоГруппа"); Выборка = Запрос.Выполнить().Выбрать(); М = Новый Массив; Пока Выборка.Следующий() Цикл М.Добавить(Выборка.Ссылка); КонецЦикла; КодКандидата.{{ENTRY}}(М, Спр("Склады", "Основной склад"), Дата(2026, 7, 1))'
