# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации
# (плоским текстом или агентным поиском) — не зашита в этот промпт.
id: B7
name: Цена закупки на дату (срез последних)
category: B
difficulty: medium

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["Получить\\w*Цен\\w*", "\\w*Цен\\w*НаДату", "\\w*СрезПоследних\\w*"]

prompt: |
  Написать функцию, возвращающую цену закупки номенклатуры, действующую на
  заданную дату.
  Параметры: номенклатура, дата.
  Цены хранятся в периодическом регистре сведений с историей изменений;
  вернуть последнюю установленную цену на дату (число).
  Если цены на дату нет — вернуть 0.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - РегистрСведений.ЦеныЗакупки
  - Справочник.Номенклатура

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные]
  platform: [срез-последних, регистр-сведений]
