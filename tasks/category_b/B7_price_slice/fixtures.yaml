# Фикстуры B7 — история цен закупки со сменой во времени → проверка среза
# последних на дату. Записи независимого РС пишутся через МенеджерЗаписи.

catalogs:
  Номенклатура:
    - {ref: Товар1, Наименование: "Товар 1"}
    - {ref: Товар2, Наименование: "Товар 2"}
    - {ref: Товар3, Наименование: "Товар 3"}   # цены нет → 0

info_records:
  ЦеныЗакупки:
    - {Период: 2026-01-01, Номенклатура: Товар1, Цена: 100}
    - {Период: 2026-03-01, Номенклатура: Товар1, Цена: 150}   # смена цены
    - {Период: 2026-01-01, Номенклатура: Товар2, Цена: 50}

# Ожидаемые результаты — справочно (проверки заданы в tests.bsl).
expected:
  past:        # Товар1 на 2026-02-01 → действует первая цена 100 (до смены)
    цена: 100
  actual:      # Товар1 на 2026-04-01 → действует новая цена 150 (после смены)
    цена: 150
  no_price:    # Товар3 на 2026-04-01 → цены нет → 0
    цена: 0
