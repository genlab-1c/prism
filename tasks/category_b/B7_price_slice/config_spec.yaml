# Синтетическая конфигурация под B7: цены закупки номенклатуры —
# периодический независимый регистр сведений с историей изменений.
# Самосогласованна: содержит ровно то, что нужно тесту и эталону.

catalogs:
  Номенклатура:
    hierarchical: false

information_registers:
  ЦеныЗакупки:
    periodicity: Day              # периодичность → доступен .СрезПоследних(Дата, Отбор)
    dimensions:
      Номенклатура: { type: СправочникСсылка.Номенклатура }
    resources:
      Цена: { type: Число, length: 15, precision: 2 }
