# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим справочник Номенклатура N листьями под группой
# «Техника», считаем обращения кандидата к данным (техжурнал 1С). См.
# harness/score/optimization_b_exec.py.
# Эталон берёт всю иерархию ОДНИМ запросом (Ссылка В ИЕРАРХИИ(&Группа)) → одно обращение к СУБД
# независимо от размера базы (p≈0). Порок наива — «обход дерева по ссылке»: тянет все листья
# ссылками и проверяет принадлежность группе, читая .Родитель через точку в цикле по каждой ссылке
# → читает ОБЪЕКТ каждого из N листьев отдельным обращением → число обращений растёт ~линейно (p≈1).
p_opt: 0.0
sizes: [20, 80]              # число синтетических листьев справочника под группой «Техника»
count: sdbl                  # регистров в задаче нет (register → нули → ось не измерена); порок наива —
                             # чтение объекта каждого листа (.Родитель через точку в цикле) = логич. SDBL
grow:
  name_prefix: ПерфЭлемент
  # +N конечных элементов (листьев) в группу «Техника»; движений/регистров нет — задача про дерево.
  catalog: { name: Номенклатура, parent: ГрТехника }
# замерочный вызов: группа «Техника» (Спр находит группу по наименованию). Эталон — один запрос
# В ИЕРАРХИИ (плоско, O10); наив, читающий .Родитель по каждой из N ссылок в цикле, обращается к
# СУБД ~N раз (линейный рост, O4). Все N листьев — под запрашиваемой группой, работа разгуляется.
call: 'КодКандидата.{{ENTRY}}(Спр("Номенклатура", "Техника"))'
