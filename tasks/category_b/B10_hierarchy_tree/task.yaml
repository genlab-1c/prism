# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации
# (плоским текстом или агентным поиском) — не зашита в этот промпт.
id: B10
name: Элементы группы по иерархии
category: B
difficulty: medium

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["Получить\\w*Элемент\\w*", "\\w*Группы", "\\w*Иерарх\\w*"]

prompt: |
  Написать функцию, возвращающую все конечные элементы справочника номенклатуры
  (без групп), находящиеся в заданной группе и любой из её подгрупп на любом
  уровне вложенности.
  Параметр: ссылка на группу.
  Вернуть массив ссылок на элементы, упорядоченный по наименованию по возрастанию.
  Группы (папки) в результат не включать.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - Справочник.Номенклатура

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные]
  platform: [иерархия]
