# Фикстуры B10 — данные, которые харнесс создаёт в базе перед тестом.
# Заранее известное дерево → детерминированный ожидаемый результат.
# Порядок в YAML: родители раньше детей (fixtures_gen ставит Родитель по уже
# объявленной переменной — иначе ошибка генерации).

catalogs:
  Номенклатура:
    # группа верхнего уровня
    - {ref: ГрТехника, Наименование: "Техника", isFolder: true}
    # подгруппа внутри «Техника»
    - {ref: ГрХолодильники, Наименование: "Холодильники", parent: ГрТехника, isFolder: true}
    # элементы подгруппы — должны попасть в результат
    - {ref: Холодильник, Наименование: "Холодильник X", parent: ГрХолодильники}
    - {ref: Морозильник, Наименование: "Морозильник М", parent: ГрХолодильники}
    # другая ветка — для проверки исключения
    - {ref: ГрКрепёж, Наименование: "Крепёж", isFolder: true}
    - {ref: Болт, Наименование: "Болт М6", parent: ГрКрепёж}

# Ожидания: элементы группы «Техника» → 2 элемента: Морозильник М, Холодильник X
# (отсортированы по наименованию: «Морозильник М» < «Холодильник X»);
# Болт в другой группе — исключён; подгруппа «Холодильники» (группа) — исключена.
expected:
  group_hierarchy:                 # ПолучитьЭлементыГруппы(Спр("Номенклатура","Техника"))
    count: 2
    order: ["Морозильник М", "Холодильник X"]
    excludes: [Болт, ГрХолодильники]
