# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации.
#
# Первая задача на ПОДЧИНЁННОМ регистре сведений (write_mode RecorderSubordinate):
# цены пишутся проведением документа УстановкаЦен, читаются срезом последних.
id: B17
name: Актуальная цена из документов установки цен
category: B
difficulty: medium

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["Получить\\w*Цен\\w*", "\\w*ЦенаНаДату", "\\w*Цен\\w*Дату"]

prompt: |
  Написать функцию получения актуальной цены номенклатуры на дату.
  Параметры: номенклатура (ссылка), вид цены (ссылка), дата.
  Цены хранятся в периодическом регистре сведений ЦеныДокументом (он подчинён
  регистратору — записи устанавливаются проведением документов УстановкаЦен).
  Вернуть цену по срезу последних на указанную дату для заданных номенклатуры и
  вида цены. Если на эту дату цена ещё не установлена — вернуть 0.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - РегистрСведений.ЦеныДокументом
  - Справочник.Номенклатура
  - Справочник.ВидыЦен

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные]
  platform: [срез-последних, регистр-сведений, документ-движения]
