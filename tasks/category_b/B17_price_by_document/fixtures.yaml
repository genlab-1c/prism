# Фикстуры B17 — данные перед тестом. Записи подчинённого РС создаются проведением
# документов (блок info_register_records: регистратор + набор записей с Период).
# Три установки цены на разные даты → детерминированный срез последних.

catalogs:
  Номенклатура:
    - {ref: Т1, Наименование: "Товар А"}
  ВидыЦен:
    - {ref: Розница, Наименование: "Розница"}

info_register_records:
  ЦеныДокументом:
    registrar: УстановкаЦен
    records:
      - {Период: 2026-01-01, Номенклатура: Т1, ВидЦены: Розница, Цена: 100}
      - {Период: 2026-02-01, Номенклатура: Т1, ВидЦены: Розница, Цена: 120}
      - {Период: 2026-03-01, Номенклатура: Т1, ВидЦены: Розница, Цена: 150}

# Ожидания (проверки в tests.bsl): срез последних —
#   на 2026-02-15 → 120 (последняя запись ≤ даты); на 2026-01-01 → 100;
#   на 2025-12-01 → 0 (до первой установки цены).
