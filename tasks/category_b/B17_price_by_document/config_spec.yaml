# Синтетическая конфигурация под B17: ПОДЧИНЁННЫЙ регистр сведений + документ-регистратор.
# ЦеныДокументом — периодический РС с write_mode RecorderSubordinate: писать напрямую
# МенеджеромЗаписи нельзя, только проведением документа (фикстуры пишут через регистратор).
# Документ УстановкаЦен указывает РС в составе движений (info_registers).

information_registers:
  ЦеныДокументом:
    write_mode: RecorderSubordinate
    periodicity: Day
    dimensions:
      Номенклатура: { type: СправочникСсылка.Номенклатура }
      ВидЦены: { type: СправочникСсылка.ВидыЦен }
    resources:
      Цена: { type: Число, length: 15, precision: 2 }

catalogs:
  Номенклатура: { hierarchical: false }
  ВидыЦен: { hierarchical: false }

documents:
  УстановкаЦен:
    info_registers: [ЦеныДокументом]   # документ-регистратор подчинённого РС
