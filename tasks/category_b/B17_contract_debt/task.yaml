# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Регистр в разрезе ДОГОВОРОВ (без измерения Контрагент): путь
# к контрагенту только через Договор.Владелец. Аванс (отрицательный остаток) в долг не идёт.
id: B17
name: Долг контрагента по договорам
category: B
difficulty: hard

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["\\w*Долг\\w*", "\\w*Задолженност\\w*", "\\w*Контрагент\\w*"]

prompt: |
  Справочник «Договоры» подчинён справочнику «Контрагенты». Регистр накопления
  «Взаиморасчеты» (остатки) ведёт сумму в разрезе ОДНОГО измерения — Договор (измерения
  Контрагент в регистре НЕТ). Положительный остаток по договору — это долг контрагента
  перед нами, отрицательный — аванс (переплата), который долгом не считается.

  Написать функцию: по ссылке на контрагента вернуть его суммарный долг — сумму
  ПОЛОЖИТЕЛЬНЫХ остатков по всем его договорам. Авансы (отрицательные остатки) в сумму
  не включать. Если долга нет — вернуть 0.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - РегистрНакопления.Взаиморасчеты
  - Справочник.Договоры
  - Справочник.Контрагенты

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные, числа]
  platform: [виртуальная-таблица, регистр-накопления, подчинённый-справочник]
