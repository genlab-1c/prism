# Фикстуры B17 — контрагенты, договоры и движения по взаиморасчётам в разрезе договора.
# Ловушки:
#  - у Альфы один договор в долге (+700), другой в АВАНСЕ (−300): наивная СУММА(СуммаОстаток)
#    свернёт их в 400 вместо долга 700;
#  - путь к контрагенту только через Договор.Владелец (измерения Контрагент нет).

catalogs:
  Контрагенты:
    - {ref: К1, Наименование: "ООО Альфа"}
    - {ref: К2, Наименование: "ООО Бета"}
    - {ref: К3, Наименование: "ООО Гамма"}   # без договоров → долг 0
  Договоры:
    - {ref: Д1, Наименование: "Д-100", owner: К1}
    - {ref: Д2, Наименование: "Д-200", owner: К1}
    - {ref: Д3, Наименование: "Д-300", owner: К2}

register_records:
  Взаиморасчеты:
    registrar: ВводВзаиморасчетов
    records:
      # Д1 (Альфа): приход 1000, гашение 300 → остаток +700 (долг)
      - {Период: 2025-01-10, Договор: Д1, Сумма: 1000, ВидДвижения: Приход}
      - {Период: 2025-02-05, Договор: Д1, Сумма: 300,  ВидДвижения: Расход}
      # Д2 (Альфа): приход 200, гашение 500 → остаток −300 (АВАНС, не долг)
      - {Период: 2025-01-15, Договор: Д2, Сумма: 200,  ВидДвижения: Приход}
      - {Период: 2025-02-10, Договор: Д2, Сумма: 500,  ВидДвижения: Расход}
      # Д3 (Бета): приход 400 → остаток +400
      - {Период: 2025-03-01, Договор: Д3, Сумма: 400,  ВидДвижения: Приход}

# Ожидания (проверки в tests.bsl):
#   Альфа → 700 (только Д1; Д2 в авансе −300 исключён; наивная сумма дала бы 400);
#   Бета  → 400;  Гамма → 0 (договоров нет).
