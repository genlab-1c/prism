# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим N договоров ОДНОГО контрагента (ООО Альфа),
# каждому — положительный остаток по регистру Взаиморасчеты; считаем обращения кандидата к
# данным (техжурнал 1С). См. harness/score/optimization_b_exec.py.
# Эталон берёт остатки ВСЕХ договоров контрагента ОДНИМ запросом к виртуальной таблице
# Взаиморасчеты.Остатки(, Договор.Владелец = &Контрагент), фиксирует остаток в разрезе договора
# подзапросом и суммирует положительные → одно обращение к СУБД независимо от числа договоров (p≈0).
# Порок наива — «запрос в цикле»: получить договоры контрагента, затем по КАЖДОМУ договору отдельным
# запросом .Остатки(, Договор = &Договор) взять остаток → число обращений растёт линейно (p≈1).
p_opt: 0.0
sizes: [20, 80]              # сколько синтетических договоров ООО Альфы добавить (+ по остатку на каждый)
count: sdbl                  # все логические обращения; и эталон (1 запрос), и наив (запрос .Остатки в
                             # цикле по договору) — sdbl ловит рост. register тоже сработал бы (порок читает
                             # физтаблицу регистра), но sdbl шире — ловит и обход .Владелец через точку в цикле
grow:
  name_prefix: ПерфДоговор
  # +N договоров, ВЛАДЕЛЕЦ — ООО Альфа (ref К1 из fixtures.yaml); контрагента растить не нужно,
  # Контрагенты обрабатываются раньше Договоров → owner К1 резолвится.
  catalog: { name: Договоры, owner: К1 }
  # + положительный остаток (приход) на каждый новый договор → долг Альфы растёт как 700 + N*100,
  #   но эталон берёт его одним запросом; наив зациклится по всем 2+N договорам Альфы.
  accumulation:
    register: Взаиморасчеты
    registrar: ВводВзаиморасчетов
    record: { Договор: "$unit", Сумма: 100, ВидДвижения: Приход, Период: 2025-06-01 }
# замерочный вызов: контрагент ООО Альфа (Спр находит К1 по наименованию). У Альфы теперь
# 2 фикстурных + N синтетических договоров с остатками — работа разгуляется по всем ним.
# Эталон — один запрос (плоско, O10); наив, беря остаток по каждому договору в цикле,
# обращается к СУБД ~N раз (линейный рост, O4).
call: 'КодКандидата.{{ENTRY}}(Спр("Контрагенты", "ООО Альфа"))'
