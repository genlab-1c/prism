# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Регистр бухгалтерии + план счетов: сальдо по счёту с учётом
# ВИДА счёта (Актив/Пассив) и СУБСЧЕТОВ (В ИЕРАРХИИ). Усложнённый вариант — наивные
# решения дают правдоподобное, но неверное число.
id: B19
name: Сальдо по счёту с учётом вида и субсчетов
category: B
difficulty: hard
# O: статика — задача точечная (O(1)); запрос-в-цикле построить нельзя, оптимизировать нечего (нет perf.yaml).

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["\\w*Сальдо\\w*", "\\w*Остаток\\w*Счет\\w*", "\\w*ПоСчету\\w*"]

prompt: |
  План счетов «Основной» и регистр бухгалтерии «Хозрасчетный» (корреспонденция:
  у проводки есть СчётДт, СчётКт, ресурс Сумма). У счёта есть стандартный реквизит
  Вид (ВидСчета: Активный/Пассивный/АктивноПассивный). Счёт может иметь субсчета
  (стандартный реквизит Родитель) — проводки бывают только по субсчетам.

  Написать функцию: по ссылке на счёт вернуть его сальдо (число), учитывая:
  - проводки самого счёта И всех его субсчетов (отбор по Счёту В ИЕРАРХИИ);
  - сальдо = (оборот по дебету) − (оборот по кредиту) по этой иерархии;
  - для счёта вида Пассивный вернуть КРЕДИТОВОЕ сальдо (кредит минус дебет), для
    Активного и АктивноПассивного — дебетовое (дебет минус кредит).

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - РегистрБухгалтерии.Хозрасчетный
  - ПланСчетов.Основной

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные, числа]
  platform: [регистр-бухгалтерии, план-счетов]
