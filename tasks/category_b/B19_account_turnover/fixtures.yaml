# Фикстуры B19 — счета (часть с субсчетами через parent) и проводки. Подобраны так,
# чтобы наивные решения дали неверное число:
#  - проводки по счёту 62 идут ТОЛЬКО на субсчета 62.01/62.02 → без В ИЕРАРХИИ сальдо 62 = 0;
#  - счёт 60 пассивный с кредитовым сальдо → без учёта Вида знак получится отрицательным.

accounts:
  Основной:
    - {ref: А51, Код: "51",    Наименование: "Расчётные счета",         Вид: Активный}
    - {ref: А26, Код: "26",    Наименование: "Общехозяйственные расходы", Вид: Активный}
    - {ref: А60, Код: "60",    Наименование: "Расчёты с поставщиками",   Вид: Пассивный}
    - {ref: А90, Код: "90",    Наименование: "Продажи",                  Вид: АктивноПассивный}
    - {ref: А62, Код: "62",    Наименование: "Расчёты с покупателями",   Вид: АктивноПассивный}
    - {ref: А6201, Код: "62.01", Наименование: "Расчёты по реализации", Вид: АктивноПассивный, parent: А62}
    - {ref: А6202, Код: "62.02", Наименование: "Авансы покупателей",    Вид: АктивноПассивный, parent: А62}

accounting_records:
  Хозрасчетный:
    registrar: Операция
    records:
      - {Период: 2025-01-10, СчетДт: А6201, СчетКт: А90, Сумма: 1000}  # выручка → субсчёт 62.01
      - {Период: 2025-01-12, СчетДт: А6202, СчетКт: А90, Сумма: 500}   # ещё → субсчёт 62.02
      - {Период: 2025-01-20, СчетДт: А51,  СчетКт: А6201, Сумма: 300}  # оплата → кредит 62.01
      - {Период: 2025-02-01, СчетДт: А26,  СчетКт: А60, Сумма: 800}    # затраты от поставщика (Кт 60)
      - {Период: 2025-02-05, СчетДт: А60,  СчетКт: А51, Сумма: 200}    # оплата поставщику (Дт 60)

# Ожидания (проверки в tests.bsl):
#   счёт 62 (АктивноПассивный, В ИЕРАРХИИ 62.01+62.02): Дт 1000+500=1500, Кт 300 → дебетовое 1200;
#       (наивно «по 62 напрямую» = 0; «дебетовый оборот» = 1500);
#   счёт 60 (Пассивный): Кт 800, Дт 200 → КРЕДИТОВОЕ сальдо 600;
#       (наивно дебет−кредит = −600);
#   счёт 51 (Активный): Дт 300, Кт 200 → дебетовое 100.
