# Синтетическая конфигурация под B19: план счетов «Основной» (счета с субсчетами
# создаются фикстурами через Родитель), регистр бухгалтерии «Хозрасчетный» с
# корреспонденцией, документ «Операция» — регистратор проводок.

charts_of_accounts:
  Основной: {}                        # счета и субсчета — данными (Код/Наименование/Вид/parent)

documents:
  Операция:
    accounting_registers: [Хозрасчетный]

accounting_registers:
  Хозрасчетный:
    chart_of_accounts: Основной
    correspondence: true
