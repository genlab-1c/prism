# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации
# (плоским текстом или агентным поиском) — не зашита в этот промпт.
id: B11
name: Контроль достаточности остатка
category: B
difficulty: medium

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["\\w*Достаточн\\w*", "\\w*Хватает\\w*", "Проверить\\w*Остат\\w*"]

prompt: |
  Написать функцию проверки, достаточно ли товара на складе для отгрузки.
  Параметры: номенклатура, склад, требуемое количество. Вернуть Истина, если
  текущий остаток на складе больше либо равен требуемому количеству, иначе Ложь.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - РегистрНакопления.ОстаткиТоваров
  - Справочник.Номенклатура
  - Справочник.Склады

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные]
  platform: [виртуальная-таблица, регистр-накопления, документ-движения]
