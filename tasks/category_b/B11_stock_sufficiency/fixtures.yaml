# Фикстуры B11 — заранее известные приход и расход → детерминированный ЧИСТЫЙ остаток.
# Движения регистра остатков пишутся через документ-регистратор ДвижениеТоваров.
# Виртуальная таблица .Остатки сама нетит приход − расход: кандидат, суммирующий
# только приходы, провалится (ловушка теста). Товар без движений → остаток 0.

catalogs:
  Склады:
    - {ref: Основной, Наименование: "Основной склад"}
  Номенклатура:
    - {ref: Товар1, Наименование: "Товар 1"}
    - {ref: Товар2, Наименование: "Товар 2"}   # без движений → остаток 0

register_records:
  ОстаткиТоваров:
    registrar: ДвижениеТоваров
    records:
      # приход 100, затем расход 60 → чистый остаток 40 (а не 100!)
      - {Период: 2026-01-10, Склад: Основной, Номенклатура: Товар1, Количество: 100, ВидДвижения: Приход}
      - {Период: 2026-02-10, Склад: Основной, Номенклатура: Товар1, Количество: 60, ВидДвижения: Расход}

# Чистый остаток Товар1 = 100 − 60 = 40. Товар2 = 0.
# Ожидаемые результаты — справочно (проверки заданы в tests.bsl).
expected:
  Товар1: 40                       # 100 приход − 60 расход
  Товар2: 0                        # движений нет → пустая выборка → 0
