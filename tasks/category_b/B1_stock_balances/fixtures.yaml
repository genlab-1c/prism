# Фикстуры B1 — данные, которые харнесс создаёт в базе перед тестом.
# Заранее известные остатки → детерминированный ожидаемый результат.
# Движения регистра пишутся через документ-регистратор ВводОстатковТоваров.

catalogs:
  Склады:
    - {ref: Основной, Наименование: "Основной склад"}
    - {ref: Резервный, Наименование: "Резервный склад"}
  Номенклатура:
    # иерархия: группа → подгруппа → товары
    - {ref: ГрБытоваяТехника, Наименование: "Бытовая техника", isFolder: true}
    - {ref: ГрХолодильники, Наименование: "Холодильники", parent: ГрБытоваяТехника, isFolder: true}
    - {ref: Холодильник, Наименование: "Холодильник X", parent: ГрХолодильники}
    - {ref: ГрКрепёж, Наименование: "Крепёж", isFolder: true}
    - {ref: Болт, Наименование: "Болт М6", parent: ГрКрепёж}

# Движения регистра остатков (приход) → текущие остатки
register_records:
  ТоварыНаСкладах:
    registrar: ВводОстатковТоваров
    records:
      - {Склад: Основной, Номенклатура: Холодильник, ВНаличии: 5}
      - {Склад: Основной, Номенклатура: Болт, ВНаличии: 100}
      - {Склад: Резервный, Номенклатура: Холодильник, ВНаличии: 3}

# Ожидаемые результаты — справочно (проверки заданы в tests.bsl).
expected:
  base_case:                       # ПолучитьОстатки([Холодильник], Основной)
    rows: 1
    остаток: {Холодильник: 5}      # НЕ 8 — только Основной склад
  group_filter:                    # фильтр по группе «Бытовая техника» (вкл. подгруппы)
    contains: [Холодильник]
    excludes: [Болт]               # Болт в другой группе → не попадает
