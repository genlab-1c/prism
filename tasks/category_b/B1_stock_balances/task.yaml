# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации
# (плоским текстом или агентным поиском) — не зашита в этот промпт.
id: B1
name: Получение остатков товаров на складе
category: B
difficulty: medium

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["Получить\\w*Остат\\w*", "Остат\\w*"]

prompt: |
  Написать функцию получения остатков товаров на складе с фильтрацией
  по группе номенклатуры.
  Параметры: массив номенклатуры, склад, группа номенклатуры (необязательный).
  Вернуть таблицу значений с колонками: Номенклатура, Остаток.
  Если массив номенклатуры пуст, а группа задана — вернуть остатки всех
  товаров этой группы и её подгрупп. Учитывать только переданный склад.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - РегистрНакопления.ТоварыНаСкладах
  - Справочник.Номенклатура
  - Справочник.Склады

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные]
  platform: [виртуальная-таблица, регистр-накопления, иерархия]
