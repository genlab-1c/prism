# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим базу, считаем обращения кандидата к данным
# (техжурнал 1С), сравниваем класс роста с p_opt эталона. См. harness/score/optimization_b_exec.py.
# Эталон берёт остатки НАБОРОМ (одна виртуальная таблица) → обращения не растут с базой (p≈0).
p_opt: 0.0
sizes: [20, 80]              # сколько синтетических «единиц» (товар + движение) добавить
# count: sdbl               # (по умолчанию) общий счётчик обращений; "register" — только чтения регистра
grow:
  name_prefix: ПерфТовар
  catalog: { name: Номенклатура, parent: ГрБытоваяТехника }   # +N товаров в группу «Бытовая техника»
  accumulation:                                               # + остаток на каждый товар
    register: ТоварыНаСкладах
    registrar: ВводОстатковТоваров
    record: { Склад: Основной, Номенклатура: "$unit", ВНаличии: 10 }
# замерочный вызов: пустой массив + группа → эталон одним запросом, «запрос в цикле» — по товару
call: 'КодКандидата.{{ENTRY}}(Новый Массив, Спр("Склады", "Основной склад"), Спр("Номенклатура", "Бытовая техника"))'
