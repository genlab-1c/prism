# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации
# (плоским текстом или агентным поиском) — не зашита в этот промпт.
id: B14
name: Свободный остаток с учётом резервов
category: B
difficulty: hard

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["\\w*Свободн\\w*", "\\w*Резерв\\w*", "Получить\\w*Остат\\w*"]

prompt: |
  Написать функцию расчёта свободного остатка товаров на складе.
  Свободный остаток = количество в наличии минус зарезервированное количество.
  Параметры: массив номенклатуры, склад. Вернуть таблицу значений с колонками
  Номенклатура, Свободно. Товары без резерва тоже должны попасть в результат
  (их резерв считать нулевым).

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - РегистрНакопления.ТоварыНаСкладах
  - РегистрНакопления.Резервы
  - Справочник.Номенклатура
  - Справочник.Склады

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные, числа]
  platform: [виртуальная-таблица, регистр-накопления]
