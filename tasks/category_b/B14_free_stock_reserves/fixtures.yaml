# Фикстуры B14 — данные, которые харнесс создаёт в базе перед тестом.
# Заранее известные остатки и резервы → детерминированный ожидаемый результат.
# Движения регистров пишутся через документы-регистраторы (приход по умолчанию).
# Главная проверка: Товар3 имеет наличие, но НЕ имеет резерва — он обязан остаться
# в результате (ЛЕВОЕ СОЕДИНЕНИЕ + ЕСТЬNULL → резерв 0), а не исчезнуть.

catalogs:
  Склады:
    - {ref: Основной, Наименование: "Основной склад"}
  Номенклатура:
    - {ref: Товар1, Наименование: "Товар 1"}
    - {ref: Товар2, Наименование: "Товар 2"}
    - {ref: Товар3, Наименование: "Товар 3"}

# Движения регистров остатков (приход) → текущие остатки наличия и резерва
register_records:
  ТоварыНаСкладах:
    registrar: ВводОстатков
    records:
      - {Склад: Основной, Номенклатура: Товар1, ВНаличии: 100}
      - {Склад: Основной, Номенклатура: Товар2, ВНаличии: 50}
      - {Склад: Основной, Номенклатура: Товар3, ВНаличии: 30}
  Резервы:
    registrar: Резервирование
    records:
      - {Склад: Основной, Номенклатура: Товар1, Зарезервировано: 30}
      - {Склад: Основной, Номенклатура: Товар2, Зарезервировано: 50}
      # Товар3 — резерва НЕТ: проверяем, что строка не теряется (ЕСТЬNULL → 0)

# Ожидания (проверки заданы в tests.bsl):
#   Товар1 → 70  (100 - 30)
#   Товар2 →  0  (50 - 50)
#   Товар3 → 30  (30 - 0; резерва нет — ЕСТЬNULL, строка ПРИСУТСТВУЕТ)
