# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим базу, считаем обращения кандидата к данным
# (техжурнал 1С), сравниваем класс роста с p_opt эталона. См. harness/score/optimization_b_exec.py.
# Эталон берёт наличие и резерв ОДНИМ запросом: две виртуальные таблицы .Остатки
# (ТоварыНаСкладах и Резервы), соединённые ЛЕВЫМ СОЕДИНЕНИЕМ по номенклатуре, с отбором
# «Склад = &Склад И Номенклатура В (&МассивНоменклатуры)» внутри параметров каждой ВТ →
# одно обращение к СУБД независимо от размера базы (p≈0). Порок наива — запрос .Остатки на
# КАЖДУЮ позицию массива в цикле (по обоим регистрам) → число обращений растёт линейно с N (p≈1).
p_opt: 0.0
sizes: [20, 80]              # сколько синтетических «единиц» (товар + остаток наличия) добавить
# count: sdbl               # (по умолчанию) все логические обращения к данным; и эталон (1 запрос),
                            # и наив (запрос .Остатки в цикле по позиции) — чтения регистров, sdbl их ловит
grow:
  name_prefix: ПерфТовар
  catalog: { name: Номенклатура }                            # +N товаров (Номенклатура НЕиерархична — все листья)
  accumulation:                                              # + остаток наличия на каждый товар
    register: ТоварыНаСкладах
    registrar: ВводОстатков
    record: { Склад: Основной, Номенклатура: "$unit", ВНаличии: 10 }
# замерочный вызов: собираем МАССИВ всех N+3 позиций запросом (в контексте Тесты — кандидату НЕ
# атрибутируется; справочник НЕиерархичен → без «НЕ ЭтоГруппа») и передаём кандидату. Эталон
# посчитает их одним запросом (плоско, O10); наив, делая .Остатки на каждую позицию в цикле,
# обратится к СУБД ~N раз (линейный рост, O4). Резерва у синтетических товаров нет — эталон
# держит их через ЛЕВОЕ СОЕДИНЕНИЕ + ЕСТЬNULL, прогон состоится.
call: 'Запрос = Новый Запрос("ВЫБРАТЬ Ссылка ИЗ Справочник.Номенклатура"); Выборка = Запрос.Выполнить().Выбрать(); М = Новый Массив; Пока Выборка.Следующий() Цикл М.Добавить(Выборка.Ссылка); КонецЦикла; КодКандидата.{{ENTRY}}(М, Спр("Склады", "Основной склад"))'
