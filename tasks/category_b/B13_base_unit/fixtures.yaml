# Фикстуры B13 — данные, которые харнесс создаёт в базе перед тестом.
# Заранее известные коэффициенты → детерминированный ожидаемый результат.
# Коэффициент — реквизит справочника (доп. ключ элемента помимо ref/Наименование).

catalogs:
  Упаковки:
    - {ref: Штука, Наименование: "Штука", Коэффициент: 1}
    - {ref: Коробка, Наименование: "Коробка", Коэффициент: 12}
    - {ref: Палета, Наименование: "Палета", Коэффициент: 480}

# Ожидаемые результаты — справочно (проверки заданы в tests.bsl).
# 3 коробки → 36; 2 палеты → 960; 5 штук → 5
expected:
  коробка: {количество: 3, результат: 36}   # 3 * 12
  палета:  {количество: 2, результат: 960}   # 2 * 480
  штука:   {количество: 5, результат: 5}     # 5 * 1
