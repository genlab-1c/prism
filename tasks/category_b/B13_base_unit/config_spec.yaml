# Синтетическая конфигурация под B13: справочник Упаковки с числовым реквизитом
# Коэффициент (множитель пересчёта упаковки в базовую единицу измерения).
# Самосогласованна: содержит ровно то, что нужно тесту и эталону.

catalogs:
  Упаковки:
    hierarchical: false
    # Реквизит справочника: значение в фикстурах задаётся доп. ключом элемента,
    # в коде читается через ссылку (Упаковка.Коэффициент).
    attributes:
      Коэффициент: { type: Число, length: 10, precision: 3 }
