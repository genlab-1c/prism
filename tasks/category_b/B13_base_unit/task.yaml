# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации
# (плоским текстом или агентным поиском) — не зашита в этот промпт.
id: B13
name: Перевод количества в базовую единицу
category: B
difficulty: easy

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["\\w*БазовуюЕдиниц\\w*", "\\w*Перевести\\w*", "\\w*Коэффициент\\w*"]

prompt: |
  Написать функцию перевода количества из единицы упаковки в базовую единицу
  измерения. Параметры: упаковка (элемент справочника Упаковки с реквизитом
  Коэффициент) и количество в этой упаковке. Вернуть количество в базовой
  единице (количество, умноженное на коэффициент упаковки).

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - Справочник.Упаковки

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные, числа]
  platform: []
