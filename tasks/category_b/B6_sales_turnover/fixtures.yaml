# Фикстуры B6 — данные, которые харнесс создаёт в базе перед тестом.
# Заранее известные движения продаж → детерминированные ожидаемые обороты.
# Движения оборотного регистра пишутся через документ-регистратор РеализацияТоваров.
# Поле «Период» (date) задаёт и дату документа, и период записи — определяет,
# в какой период попадёт оборот.

catalogs:
  Склады:
    - {ref: Основной, Наименование: "Основной склад"}
    - {ref: Резервный, Наименование: "Резервный склад"}
  Номенклатура:
    - {ref: Товар1, Наименование: "Товар 1"}
    - {ref: Товар2, Наименование: "Товар 2"}

# Движения регистра продаж (обороты) по периодам и складам.
register_records:
  Продажи:
    registrar: РеализацияТоваров
    records:
      - {Период: 2026-01-10, Склад: Основной,  Номенклатура: Товар1, Количество: 10, Сумма: 1000}
      - {Период: 2026-02-15, Склад: Основной,  Номенклатура: Товар1, Количество: 5,  Сумма: 500}
      - {Период: 2026-02-20, Склад: Резервный, Номенклатура: Товар1, Количество: 7,  Сумма: 700}
      - {Период: 2026-03-05, Склад: Основной,  Номенклатура: Товар2, Количество: 3,  Сумма: 600}

# Ожидаемые результаты — справочно (проверки заданы в tests.bsl).
expected:
  february_all:                    # февраль без склада: суммируются обе февральские строки Товар1
    rows: 1                        # Товар2 только в марте → в феврале одна строка
    Товар1: {Количество: 12, Сумма: 1200}   # 5 + 7
  february_main:                   # февраль, склад Основной: только строка от 2026-02-15
    Товар1: {Количество: 5, Сумма: 500}
  q1_all:                          # весь квартал без склада
    rows: 2
    Товар1: {Количество: 22}       # 10 + 5 + 7
    Товар2: {Количество: 3}
