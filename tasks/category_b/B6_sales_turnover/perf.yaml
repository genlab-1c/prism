# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим базу, считаем обращения кандидата к данным
# (техжурнал 1С), сравниваем класс роста с p_opt эталона. См. harness/score/optimization_b_exec.py.
# Эталон берёт обороты НАБОРОМ — один запрос к виртуальной таблице .Обороты → обращения к СУБД
# не растут с базой (p≈0, O10). Наив «отчёт по товарам через запрос в цикле» (перебрать всю
# Номенклатуру и на каждый товар отдельный запрос оборотов) → N+1 запросов, рост ~линейный (O4).
p_opt: 0.0
sizes: [20, 80]              # число синтетических «единиц» (товар + движение продажи) добавить
# count: sdbl               # (по умолчанию) все логические обращения — ловит цикл по товару как
                            # через справочник (Номенклатура.Выбрать), так и через регистр/.Обороты.
grow:
  name_prefix: ПерфТовар
  catalog: { name: Номенклатура }                            # +N товаров в справочник Номенклатура
  accumulation:                                              # + оборот продажи на каждый товар
    register: Продажи
    registrar: РеализацияТоваров
    record: { Склад: Основной, Номенклатура: "$unit", Количество: 10, Сумма: 100, Период: 2026-06-15 }
# замерочный вызов: весь год, без склада → эталон одним запросом по всем товарам; наив, строящий
# строку на каждый товар отдельным запросом, обходит все N новых единиц (плюс исходные фикстуры).
call: 'КодКандидата.{{ENTRY}}(Дата(2026, 1, 1), Дата(2026, 12, 31))'
