# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации.
id: B2
name: Заполнение цен в табличной части
category: B
difficulty: hard

entry_point_patterns: ["Заполн\\w*Цен\\w*", "\\w*Цен\\w*"]

prompt: |
  Написать процедуру заполнения цен в табличной части «Товары» документа.
  Параметры: табличная часть, вид цен, дата.
  Получить актуальные на дату цены из регистра сведений (срез последних)
  и пересчитать суммы строк (Сумма = Количество × Цена).
  Если цена не найдена — оставить нулевые цену и сумму.

expected_objects:
  - РегистрСведений.ЦеныНоменклатуры
  - Справочник.Номенклатура
  - Справочник.ВидыЦен
