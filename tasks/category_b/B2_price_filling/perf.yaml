# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим базу, считаем обращения кандидата к данным
# (техжурнал 1С), сравниваем класс роста с p_opt эталона. См. harness/score/optimization_b_exec.py.
# Эталон берёт цены НАБОРОМ (один срез последних на всю ТЧ: Номенклатура В (&список)) → обращения
# не растут с базой (p≈0). Наив «срез последних в цикле по строкам ТЧ» → по обращению на строку (p≈1).
p_opt: 0.0
sizes: [20, 80]              # N синтетических «единиц» (товар + оптовая цена) = столько строк в ТЧ замера
# count: sdbl                # (по умолчанию) все логические обращения к данным; ловит запрос в цикле
grow:
  name_prefix: ПерфТовар
  catalog: { name: Номенклатура }                       # +N товаров «ПерфТовар i» (плоский список)
  information:                                          # + оптовая цена на каждый товар
    register: ЦеныНоменклатуры
    record: { Номенклатура: "$unit", ВидЦен: Оптовая, Цена: 100, Период: 2026-01-01 }
# Замерочный вызов: собрать ТЧ «Товары» из ВСЕХ N синтетических товаров (этот запрос идёт в модуле
# «Тесты» → в счёт кандидата НЕ попадает) и один раз позвать кандидата. Эталон закроет всю ТЧ одним
# срезом (плоско), «срез последних в цикле по строкам» сделает по обращению к РС на строку (растёт).
call: 'Док = Документы.РеализацияТоваров.СоздатьДокумент(); ЗапросПерф = Новый Запрос("ВЫБРАТЬ Ссылка КАК Ссылка ИЗ Справочник.Номенклатура ГДЕ Наименование ПОДОБНО ""ПерфТовар%"""); Выб = ЗапросПерф.Выполнить().Выбрать(); Пока Выб.Следующий() Цикл Стр = Док.Товары.Добавить(); Стр.Номенклатура = Выб.Ссылка; Стр.Количество = 2; КонецЦикла; КодКандидата.{{ENTRY}}(Док.Товары, Спр("ВидыЦен", "Оптовая"), Дата(2026, 4, 1))'
