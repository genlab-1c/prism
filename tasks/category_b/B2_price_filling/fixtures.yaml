# Фикстуры B2 — цены со сменой во времени → проверка среза последних на дату.

catalogs:
  Номенклатура:
    - {ref: Холодильник, Наименование: "Холодильник X"}
    - {ref: Болт, Наименование: "Болт М6"}     # оптовой цены нет → нули
  ВидыЦен:
    - {ref: Оптовая, Наименование: "Оптовая"}
    - {ref: Розничная, Наименование: "Розничная"}   # цена есть, но другой вид — не должна подмешаться

info_records:
  ЦеныНоменклатуры:
    - {Период: 2026-01-01, Номенклатура: Холодильник, ВидЦен: Оптовая, Цена: 100}
    - {Период: 2026-03-01, Номенклатура: Холодильник, ВидЦен: Оптовая, Цена: 120}   # смена цены
    - {Период: 2026-01-01, Номенклатура: Холодильник, ВидЦен: Розничная, Цена: 999}
    # У Болта ТОЛЬКО розничная: кандидат без фильтра по виду цен получит Болту 50,
    # а не 0 — тест «без цены» детерминированно завалится (закрепляет фильтр).
    - {Период: 2026-01-01, Номенклатура: Болт, ВидЦен: Розничная, Цена: 50}

expected:
  actual:        # на 2026-04-01, Оптовая: цена 120, кол-во 2 → сумма 240
    цена: 120
    сумма: 240
  slice_past:    # на 2026-02-01 действует старая цена 100 → сумма 200
    цена: 100
    сумма: 200
  no_price:      # Болт: цены нет → 0/0
    цена: 0
    сумма: 0
