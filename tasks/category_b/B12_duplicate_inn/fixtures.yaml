# Заранее известный состав ИНН → детерминированный ожидаемый результат.

catalogs:
  Контрагенты:
    - {ref: К1, Наименование: "ООО Альфа", ИНН: "7707083893"}
    - {ref: К2, Наименование: "ООО Бета", ИНН: "7707083893"}    # дубль ИНН с К1
    - {ref: К3, Наименование: "ООО Гамма", ИНН: "5009053043"}   # уникальный

# Ожидания (проверки заданы в tests.bsl):
#   ИНН 7707083893 кроме К1 → есть дубль (К2);
#   ИНН 7707083893 кроме К2 → есть дубль (К1);
