# Синтетическая конфигурация под B12: один справочник «Контрагенты» с реквизитом ИНН.
# Самосогласованна: содержит ровно то, что нужно тесту и эталону.
# Реквизит ИНН объявлен блоком attributes у справочника (как у документа) — генератор
# создаёт его в метаданных, а фикстуры присваивают значение дополнительным ключом.

catalogs:
  Контрагенты:
    hierarchical: false
    attributes:
      ИНН: { type: Строка, length: 12 }
