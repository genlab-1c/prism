# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим справочник Контрагенты на N синтетических
# элементов, считаем обращения кандидата к данным (техжурнал 1С). См.
# harness/score/optimization_b_exec.py.
# Эталон берёт данные НАБОРОМ — один запрос с отбором «ГДЕ ИНН = &ИНН И Ссылка <> &Исключаемый»
# (ВЫБРАТЬ ПЕРВЫЕ 1) → одно обращение к СУБД независимо от размера справочника (p≈0).
# Порок наива — «чтение через точку в цикле»: выбрать все ссылки без отбора по ИНН и по каждой
# читать реквизит .ИНН через точку (Ссылка.ИНН) → читает ОБЪЕКТ каждого из N контрагентов
# отдельным обращением → число обращений растёт ~линейно (p≈1). Это модель B10.
p_opt: 0.0
sizes: [20, 80]              # число синтетических контрагентов, добавленных в справочник
count: sdbl                  # регистров в задаче нет (register → нули → ось не измерена); порок
                             # наива — чтение реквизита .ИНН каждого элемента через точку = логич. SDBL
grow:
  name_prefix: ПерфКонтрагент
  # +N контрагентов (справочник неиерархический → без parent/owner). Всем задаём одинаковый
  # «нейтральный» ИНН, не совпадающий с искомым — чтобы наив не нашёл дубль рано, а сканировал всех.
  catalog: { name: Контрагенты, attrs: { ИНН: "0000000000" } }
# замерочный вызов: ищем ЗАВЕДОМО отсутствующий ИНН "9999999999" (среди выросших — только
# "0000000000", в фикстурах — 7707083893/5009053043), исключаемый — К3 «ООО Гамма» (нужен по
# сигнатуре). Эталон вернёт Ложь одним пустым запросом (плоско, O10); наив со short-circuit не
# найдёт совпадения и обойдёт ВСЕ N+3 контрагента, читая .ИНН через точку → рост ~линейный (O4).
call: 'КодКандидата.{{ENTRY}}("9999999999", Спр("Контрагенты", "ООО Гамма"))'
