# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации
# (плоским текстом или агентным поиском) — не зашита в этот промпт.
id: B12
name: Поиск дубля контрагента по ИНН
category: B
difficulty: medium

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["\\w*Дубл\\w*", "\\w*ИНН\\w*", "Найти\\w*Контрагент\\w*"]

prompt: |
  Написать функцию проверки уникальности ИНН контрагента. Параметры: ИНН (строка)
  и ссылка на контрагента, которого нужно исключить из проверки (он сам).
  Вернуть Истина, если в справочнике есть ДРУГОЙ контрагент с таким же ИНН,
  иначе Ложь.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - Справочник.Контрагенты

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные, строки]
  platform: []
