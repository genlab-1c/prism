# Фикстуры B15 — данные, которые харнесс создаёт в базе перед тестом.
# Заранее известные обороты → детерминированная ABC-классификация.
# Движения оборотного регистра пишутся через документ-регистратор Реализация.
# Поле «Период» (date) задаёт и дату документа, и период записи оборота.

catalogs:
  Номенклатура:
    - {ref: Товар1, Наименование: "Товар 1"}
    - {ref: Товар2, Наименование: "Товар 2"}
    - {ref: Товар3, Наименование: "Товар 3"}

# Движения регистра продаж (обороты) за февраль 2026.
register_records:
  Продажи:
    registrar: Реализация
    records:
      - {Период: 2026-02-05, Номенклатура: Товар1, Сумма: 800}
      - {Период: 2026-02-10, Номенклатура: Товар2, Сумма: 150}
      - {Период: 2026-02-15, Номенклатура: Товар3, Сумма: 50}

# Общий оборот 1000. Доли: Товар1 80% (накопл. 80% → A), Товар2 15% (накопл. 95% → B),
# Товар3 5% (накопл. 100% → C). Границы: A ≤80, B ≤95, C иначе.
