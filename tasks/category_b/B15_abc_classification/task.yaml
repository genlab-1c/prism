# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации
# (плоским текстом или агентным поиском) — не зашита в этот промпт.
id: B15
name: ABC-классификация номенклатуры
category: B
difficulty: hard

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["\\w*ABC\\w*", "\\w*Классификац\\w*", "\\w*АВС\\w*"]

prompt: |
  Написать функцию ABC-классификации номенклатуры по сумме оборота за период.
  Параметры: начало периода, конец периода. Отсортировать номенклатуру по
  обороту по убыванию и присвоить класс по накопленной доле в общем обороте:
  класс "A" — пока накопленная доля не превышает 80%, класс "B" — до 95%
  включительно, класс "C" — остальные. Вернуть таблицу значений с колонками
  Номенклатура и Класс.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - РегистрНакопления.Продажи
  - Справочник.Номенклатура

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные, коллекции, алгоритм]
  platform: [виртуальная-таблица, регистр-накопления]
