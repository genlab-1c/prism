# Синтетическая конфигурация под B15 (декларативная спека → synthconfig → база 1С).
# Самосогласованна: содержит ровно то, что нужно тесту и эталону.
# Оборотный регистр ТРЕБУЕТ документ-регистратор — движения пишутся через него
# (это правило платформы: движения регистра накопления без регистратора не записать).

catalogs:
  Номенклатура:
    hierarchical: false

documents:
  # Документ-регистратор: через него фикстуры пишут движения регистра продаж.
  Реализация:
    registers: [Продажи]

accumulation_registers:
  Продажи:
    register_type: Turnovers      # обороты → виртуальная таблица .Обороты, ресурс +«Оборот»
    dimensions:
      Номенклатура: { type: СправочникСсылка.Номенклатура }
    resources:
      Сумма: { type: Число, length: 15, precision: 2 }
