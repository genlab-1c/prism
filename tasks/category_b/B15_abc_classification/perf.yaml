# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим базу, считаем обращения кандидата к данным
# (техжурнал 1С), сравниваем класс роста с p_opt эталона. См. harness/score/optimization_b_exec.py.
# Эталон берёт обороты ВСЕЙ номенклатуры ОДНИМ запросом к виртуальной таблице
# РегистрНакопления.Продажи.Обороты (агрегация по номенклатуре + сортировка на сервере), дальше
# классифицирует в памяти → одно обращение к СУБД независимо от размера базы (p≈0). Порок наива —
# «запрос в цикле»: перебрать всю номенклатуру и на КАЖДЫЙ товар выполнить свой запрос оборота
# (.Обороты с отбором по номенклатуре) → число обращений растёт линейно с числом товаров (p≈1).
p_opt: 0.0
sizes: [20, 80]              # сколько синтетических «единиц» (товар + оборот за период) добавить
# count: sdbl               # (по умолчанию) все логические обращения к данным; и эталон (1 запрос),
                            # и наив (запрос .Обороты в цикле по товару) — чтения регистра, sdbl их ловит
grow:
  name_prefix: ПерфТовар
  catalog: { name: Номенклатура }                            # +N товаров (плоско, лист — справочник неиерархический)
  accumulation:                                              # + оборот продаж на каждый товар за период
    register: Продажи
    registrar: Реализация
    record: { Номенклатура: "$unit", Сумма: 100, Период: 2026-02-10 }
# замерочный вызов: границы периода охватывают ВСЕ обороты (исходные + N синтетических за февраль).
# Эталон посчитает обороты всей номенклатуры одним запросом (плоско, O10); наив, выполняя запрос
# оборота на каждый из N+ товаров в цикле, обратится к СУБД ~N раз (линейный рост, O4).
call: 'КодКандидата.{{ENTRY}}(Дата(2026, 2, 1), Дата(2026, 2, 28))'
