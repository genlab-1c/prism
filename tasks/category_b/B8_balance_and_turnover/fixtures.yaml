# Фикстуры B8 — данные, которые харнесс создаёт в базе перед тестом.
# Задача построена на остатках и приходах (без расходов):
#   движение ДО начала периода → начальный остаток;
#   движения ВНУТРИ периода   → приход.
# Это корректно проверяет границы периода виртуальной таблицы .ОстаткиИОбороты.
# Движения регистра пишутся через документ-регистратор ВводТоваров.
# (Расходные движения тоже доступны — поле «ВидДвижения: Расход»; здесь не нужны.)

catalogs:
  Склады:
    - {ref: Основной, Наименование: "Основной склад"}
  Номенклатура:
    - {ref: Товар1, Наименование: "Товар 1"}

register_records:
  ДвиженияТоваров:
    registrar: ВводТоваров
    records:
      - {Период: 2026-01-10, Склад: Основной, Номенклатура: Товар1, Количество: 10}   # до периода → нач.остаток
      - {Период: 2026-02-05, Склад: Основной, Номенклатура: Товар1, Количество: 4}    # в периоде → приход
      - {Период: 2026-02-28, Склад: Основной, Номенклатура: Товар1, Количество: 6}    # граница периода → приход (только с КонецДня)

# Ожидания за период (Дата(2026,2,1)..КонецДня(Дата(2026,2,28))) для Товар1/Основной —
# справочно (проверки заданы в tests.bsl). Движение 28.02 щупает границу КонецПериода:
# попадает в приход ТОЛЬКО если кандидат берёт конец дня, а не Дата(...)=00:00:00.
#   НачальныйОстаток=10, Приход=10, Расход=0, КонечныйОстаток=20
expected:
  february:
    НачальныйОстаток: 10
    Приход: 10
    Расход: 0
    КонечныйОстаток: 20
