# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации.
id: B5
name: Пересчёт валютных сумм
category: B
difficulty: hard

entry_point_patterns: ["Пересчит\\w*", "\\w*Валют\\w*", "Конверт\\w*"]

prompt: |
  Написать процедуру пересчёта сумм документа при смене валюты.
  Параметры: табличная часть «Товары», исходная валюта,
  новая валюта, дата курса. Пересчитать цены и суммы строк через кросс-курс
  (курсы валют хранятся к базовой валюте с учётом кратности).
  При отсутствии курса любой из валют на дату вызвать исключение.

expected_objects:
  - РегистрСведений.КурсыВалют
  - Справочник.Валюты
