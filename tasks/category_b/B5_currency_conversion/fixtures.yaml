# Фикстуры B5 — курсы валют с кратностью → детерминированный кросс-курс.
# Целочисленные ожидания подобраны, чтобы округление не влияло на проверки.

catalogs:
  Номенклатура:
    - {ref: Холодильник, Наименование: "Холодильник X"}
  Валюты:
    - {ref: Доллар, Наименование: "USD"}
    - {ref: Евро, Наименование: "EUR"}
    - {ref: Йена, Наименование: "JPY"}
    - {ref: Тугрик, Наименование: "MNT"}   # курса нет → исключение

info_records:
  КурсыВалют:
    - {Период: 2026-01-01, Валюта: Доллар, Курс: 90, Кратность: 1}
    - {Период: 2026-01-01, Валюта: Евро, Курс: 100, Кратность: 1}
    - {Период: 2026-01-01, Валюта: Йена, Курс: 60, Кратность: 100}   # 60 руб за 100 иен

expected:
  usd_to_eur:    # цена 90 USD → 90·(90/1)/(100/1) = 81; сумма 2·81 = 162
    цена: 81
    сумма: 162
  usd_to_jpy:    # цена 90 USD → 90·90/(60/100) = 13500
    цена: 13500
  no_rate:       # MNT без курса → исключение
    exception: true
