# Замер оси O ИСПОЛНЕНИЕМ (категория B). Растим табличную часть документа (число строк = N
# синтетических товаров), считаем обращения кандидата к СУБД (техжурнал 1С).
# См. harness/score/optimization_b_exec.py.
#
# Кросс-курс зависит ТОЛЬКО от пары валют документа (ИсходнаяВалюта/НоваяВалюта) — это инвариант
# строк табличной части. Эталон читает СрезПоследних дважды ДО цикла → обращения к КурсыВалют
# НЕ растут с числом строк (p≈0). Антипаттерн «СрезПоследних в цикле по строкам» пересчитывает
# курс на каждой строке → 2·N обращений, растёт линейно с базой (p≈1).
p_opt: 0.0
sizes: [20, 80]              # N товаров «ПерфТовар i» = столько строк в табличной части замера
# count: sdbl               # (по умолчанию) все логические обращения к данным; ловит чтение в цикле
grow:
  name_prefix: ПерфТовар
  catalog: { name: Номенклатура }   # +N товаров «ПерфТовар i» (курсы валют берутся из fixtures)
# Замерочный вызов идёт в модуле «Тесты» (в счёт кандидата НЕ попадает): собрать ТЧ «Товары» из
# ВСЕХ N синтетических товаров и один раз позвать кандидата на пересчёт USD→EUR (курсы есть в fixtures).
# Эталон закроет пересчёт двумя срезами (плоско), «срез в цикле по строкам» даст обращение на строку.
call: >-
  Док = Документы.ЗаказКлиента.СоздатьДокумент();
  ЗапросПерф = Новый Запрос("ВЫБРАТЬ Ссылка КАК Ссылка ИЗ Справочник.Номенклатура ГДЕ Наименование ПОДОБНО ""ПерфТовар%""");
  Выб = ЗапросПерф.Выполнить().Выбрать();
  Пока Выб.Следующий() Цикл
  Стр = Док.Товары.Добавить(); Стр.Номенклатура = Выб.Ссылка; Стр.Количество = 2; Стр.Цена = 90;
  КонецЦикла;
  КодКандидата.{{ENTRY}}(Док.Товары, Спр("Валюты", "USD"), Спр("Валюты", "EUR"), Дата(2026, 1, 1))
