# Синтетическая конфигурация под B16: справочник «Контрагенты» с реквизитом-перечислением.
# Самосогласованна: ровно то, что нужно тесту и эталону.
# Перечисление ЮридическийСтатус объявлено блоком enums (значения предопределены —
# фикстуры для них не нужны); реквизит справочника ссылается на него через
# ПеречислениеСсылка, фикстуры присваивают значение строкой "Перечисления.X.Y".

enums:
  ЮридическийСтатус: [ЮрЛицо, ФизЛицо, ИП, Прочее]   # «Прочее» намеренно без носителей → тест пустого результата

catalogs:
  Контрагенты:
    hierarchical: false
    attributes:
      ЮридическийСтатус: { type: ПеречислениеСсылка.ЮридическийСтатус }
