# Фикстуры B16 — данные, которые харнесс создаёт в базе перед тестом.
# Реквизит-перечисление задаётся обычным ключом элемента со значением вида
# "Перечисления.<Имя>.<Значение>" (генератор пробрасывает его как ссылку перечисления,
# а не строку). Заранее известный состав → детерминированный ожидаемый результат.

catalogs:
  Контрагенты:
    - {ref: К1, Наименование: "ООО Альфа",  ЮридическийСтатус: "Перечисления.ЮридическийСтатус.ЮрЛицо"}
    - {ref: К2, Наименование: "ИП Петров",  ЮридическийСтатус: "Перечисления.ЮридическийСтатус.ИП"}
    - {ref: К3, Наименование: "ООО Гамма",  ЮридическийСтатус: "Перечисления.ЮридическийСтатус.ЮрЛицо"}
    - {ref: К4, Наименование: "Иванов И.И.", ЮридическийСтатус: "Перечисления.ЮридическийСтатус.ФизЛицо"}

# Ожидания (проверки заданы в tests.bsl):
#   ЮрЛицо → К1, К3 (2 строки, по наименованию: «ООО Альфа», «ООО Гамма»);
#   ИП     → К2 (1 строка, «ИП Петров»);
#   Прочее → пусто (0 строк) — ловушка «фильтр строкой/мимо перечисления» здесь не сработает.
