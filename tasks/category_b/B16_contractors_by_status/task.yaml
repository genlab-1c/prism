# Категория B — платформенная задача, исполняется в реальном 1С против СИНТЕТИЧЕСКОЙ
# базы (config_spec.yaml). Схема метаданных подаётся модели слоем генерации
# (плоским текстом или агентным поиском) — не зашита в этот промпт.
#
# Первая задача на ПЕРЕЧИСЛЕНИИ (расширение генератора Tier 1): проверяет, что модель
# фильтрует по значению перечисления через ссылку (Перечисления.X.Y), а не строкой.
id: B16
name: Контрагенты заданного юридического статуса
category: B
difficulty: medium

# Сигнатура для ориентира; имя функции детектится харнессом (как в категории A).
entry_point_patterns: ["Получить\\w*Контрагент\\w*", "\\w*Контрагент\\w*Статус\\w*", "\\w*ПоСтатусу\\w*"]

prompt: |
  Написать функцию, возвращающую контрагентов с заданным юридическим статусом.
  Параметр: ЮридическийСтатус — значение перечисления ЮридическийСтатус
  (возможные значения: ЮрЛицо, ФизЛицо, ИП, Прочее).
  Вернуть таблицу значений с колонками Контрагент (ссылка) и Наименование,
  упорядоченную по наименованию по возрастанию. Если контрагентов с таким
  статусом нет — вернуть пустую таблицу значений.

# Объекты метаданных, которых задача касается — сид для оси P (обращения к схеме).
expected_objects:
  - Справочник.Контрагенты
  - Перечисление.ЮридическийСтатус

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [запрос, метаданные]
  platform: []
