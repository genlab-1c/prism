# Контролируемый словарь тегов задач — оси анализа «где ИИ силён/слаб».
#
# Теги структурны (по измерениям) и мультизначны: задача честно несёт несколько
# навыков и попадает в несколько срезов. Словарь закрыт: check валидирует теги
# задач против него (опечатка/самодеятельность = fail) — иначе срез соврёт.
#
# Агрегируют ПО ОСЯМ (M, для platform — ещё P), не по Q; макро-среднее (равный
# вес на задачу) с обязательным n; читать модель-vs-модель (конфаунд сложности
# сокращается). См. docs/status.md.

dimensions:

  skill:                              # что по сути проверяем (главная ось)
    multi: true
    values:
      - строки                        # парсинг/сборка текста
      - даты                          # арифметика дат
      - числа                         # вычисления, округление, точность
      - коллекции                     # массивы/структуры/ТЗ: сортировка, дедуп, группировка
      - алгоритм                      # нетривиальное управление: рекурсия, динамика, интервалы, стек
      - запрос                        # язык запросов 1С
      - метаданные                    # корректная работа с объектами платформы

  platform:                           # какая конструкция 1С (только категория B)
    multi: true
    applies_to: [B]
    values:
      - виртуальная-таблица           # .Остатки / .Обороты / .ОстаткиИОбороты
      - срез-последних                # РС .СрезПоследних
      - регистр-накопления
      - регистр-сведений
      - регистр-бухгалтерии           # проводки Дт/Кт, обороты/сальдо по счёту
      - план-счетов                   # счета, вид счёта (Актив/Пассив), субконто
      - план-видов-характеристик      # ПВХ: виды субконто / доп. характеристики
      - подчинённый-справочник        # Владелец (договоры/контакты контрагента)
      - константа                     # чтение значения константы конфигурации
      - табличная-часть               # заполнение/чтение ТЧ документа
      - иерархия                      # В ИЕРАРХИИ, группы справочника
      - документ-движения             # запись движений через регистратор

meta:
  version: "1.0.0"
  description: Словарь тегов задач PRISM (срезы анализа качества)
