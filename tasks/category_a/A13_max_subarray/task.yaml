id: A13
name: Максимальная сумма подмассива
category: A
difficulty: medium
entry_point: МаксСуммаПодмассива
signature: "Функция МаксСуммаПодмассива(Массив) Экспорт"
prompt: |
  Дан массив чисел (могут быть отрицательными). Вернуть максимальную сумму
  непрерывного непустого подмассива — то есть наибольшую из сумм всех отрезков
  подряд идущих элементов.

  Например, для [-2, 1, -3, 4, -1, 2, 1, -5, 4] ответ 6 (отрезок [4, -1, 2, 1]).
  Если массив пуст — вернуть 0.
tags:
  skill: [числа, алгоритм]
