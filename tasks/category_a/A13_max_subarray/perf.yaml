# Исполнительная оценка O. Оптимум — алгоритм Кадане за один проход, O(N) → p_opt = 1.0.
# Наивный капкан — перебрать ВСЕ пары (начало, конец) и суммировать: вложенный цикл O(N²)
# (perf_baseline.bsl). Вход — случайные числа со знаком (есть отрицательные, чтобы Кадане
# реально «перезапускал» отрезок, а не суммировал всё подряд).
p_opt: 1.0
sizes: [200, 400, 800, 1600]
gen: |
  Массив = Новый Массив;
  Сд = 12345;
  Для Сч = 1 По {n} Цикл
      Сд = (Сд * 48271) % 2147483647;
      Массив.Добавить((Сд % 200) - 100);
  КонецЦикла;
call: "{entry}(Массив);"
