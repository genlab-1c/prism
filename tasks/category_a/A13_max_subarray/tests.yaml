entry_point_patterns:
  - "\\w*Сумм\\w*Подмассив\\w*"
  - "Максимальн\\w*"
  - "\\w*Подмассив\\w*"
tests:
  - args: [[1, 2, 3]]
    expected: 6
  - args: [[-2, 1, -3, 4, -1, 2, 1, -5, 4]]
    expected: 6
  # все отрицательные → максимум одиночный (наименее отрицательный)
  - args: [[-1, -2, -3]]
    expected: -1
  - args: [[-5]]
    expected: -5
  - args: [[5]]
    expected: 5
  # пустой массив
  - args: [[]]
    expected: 0
  - args: [[1, -1, 1, -1, 1]]
    expected: 1
  - args: [[2, -1, 2, -1, 2]]
    expected: 4
  - args: [[3, -2, 5, -1]]
    expected: 6
  - args: [[0, 0, 0]]
    expected: 0
  # большой отрицательный разрыв в середине
  - args: [[8, -20, 7, 3]]
    expected: 10
