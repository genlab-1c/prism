# Исполнительная оценка O. Скрытая O(N²) — склейка результата в цикле (ПризмаСклейка).
# Худший случай — частые смены символа (алфавит из 4) → много серий → результат растёт ~N
# и склейка дорожает. Оптимум — массив + СтрСоединить, O(N) → p_opt = 1.0.
# sizes умеренные: инструментированная склейка O(N²) под codestat на больших N упирается
# в таймаут 15с; до 2400 рост класса меряется чисто (медленный эталон → O=4, не O=2).
p_opt: 1.0
sizes: [300, 600, 1200, 2400]
gen: |
  Симв = Новый Массив;
  Сд = 12345;
  Для Сч = 1 По {n} Цикл
      Сд = (Сд * 48271) % 2147483647;
      Симв.Добавить(Сред("abcd", (Сд % 4) + 1, 1));
  КонецЦикла;
  Текст = СтрСоединить(Симв, "");
call: "{entry}(Текст);"
