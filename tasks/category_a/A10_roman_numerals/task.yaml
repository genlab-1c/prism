# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A10
name: Число в римскую запись
category: A
difficulty: medium
entry_point: ЧислоВРимское               # имя функции, которую вызывает харнесс
signature: "Функция ЧислоВРимское(Число) Экспорт"
prompt: |
  Написать функцию, которая принимает целое число и возвращает его римскую
  запись строкой. Используются символы I, V, X, L, C, D, M, включая
  вычитательную форму IV, IX, XL, XC, CD, CM.
  Поддерживаемый диапазон: 1..3999. Для чисел вне диапазона (меньше 1 или
  больше 3999) вернуть пустую строку "".

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [числа, алгоритм]
