# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A4
name: Объединение пересекающихся интервалов
category: A
difficulty: hard
entry_point: ОбъединитьИнтервалы          # имя функции, которую вызывает харнесс
signature: "Функция ОбъединитьИнтервалы(Интервалы) Экспорт"
prompt: |
  На входе массив интервалов; каждый интервал — массив из двух чисел [начало, конец],
  где начало <= конец. Вернуть массив непересекающихся интервалов, отсортированных по
  возрастанию начала, объединив все пересекающиеся И соприкасающиеся интервалы
  (например [1,3] и [3,5] дают [1,5]). Исходные интервалы могут идти в произвольном
  порядке. Каждый интервал результата — массив из двух чисел.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [алгоритм, коллекции]
