# Исполнительная оценка O. Доминирует сортировка интервалов по началу. Эталон сортирует
# пузырьком O(N²); оптимум — O(N·logN) → p_opt = 1.1. Интервалы короткие со случайным
# началом по большому диапазону → почти не пересекаются, результат ~N, цена в сортировке.
p_opt: 1.1
sizes: [200, 400, 800, 1600]
gen: |
  Интервалы = Новый Массив;
  Сд = 12345;
  Для Сч = 1 По {n} Цикл
      Сд = (Сд * 48271) % 2147483647;
      Начало = Сд % 1000000;
      Пара = Новый Массив;
      Пара.Добавить(Начало);
      Пара.Добавить(Начало + (Сд % 100));
      Интервалы.Добавить(Пара);
  КонецЦикла;
call: "{entry}(Интервалы);"
