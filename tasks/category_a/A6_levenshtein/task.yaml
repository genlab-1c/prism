# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A6
name: Расстояние Левенштейна
category: A
difficulty: hard
entry_point: РасстояниеЛевенштейна          # имя функции, которую вызывает харнесс
signature: "Функция РасстояниеЛевенштейна(Строка1, Строка2) Экспорт"
prompt: |
  Даны две строки. Вернуть редакционное расстояние Левенштейна — минимальное
  число операций вставки, удаления или замены одного символа, необходимых,
  чтобы превратить первую строку во вторую.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [строки, алгоритм]
