# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
id: A6
name: Вычисление факториала
category: A
difficulty: easy
entry_point: ВычислитьФакториал
signature: "Функция ВычислитьФакториал(Число) Экспорт"
prompt: |
  Написать функцию вычисления факториала неотрицательного целого числа.
  Параметры: целое число N (>= 0). Вернуть N! (факториал). Факториал 0 равен 1.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [числа, алгоритм]
