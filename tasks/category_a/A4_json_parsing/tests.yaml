# A4: парсинг JSON-строки → Структура/Массив (вложенность), при ошибке — Неопределено.
entry_point_patterns:
  - "\\w*JSON\\w*"
tests:
  - args: ["{\"имя\": \"тест\", \"число\": 42}"]
    expected: {"имя": "тест", "число": 42}
  - args: ["[1, 2, 3]"]
    expected: [1, 2, 3]
  - args: ["{\"а\": {\"б\": [1, 2]}}"]
    expected: {"а": {"б": [1, 2]}}
  - args: ["{сломанный json"]
    expected: null            # Неопределено
