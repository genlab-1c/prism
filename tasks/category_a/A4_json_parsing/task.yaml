# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
id: A4
name: Парсинг JSON-строки
category: A
difficulty: medium
entry_point: РазобратьJSON
signature: "Функция РазобратьJSON(СтрокаJSON) Экспорт"
prompt: |
  Написать функцию парсинга JSON-строки. Параметры: строка в формате JSON. Вернуть
  соответствующий объект платформы: структуру для объектов, массив для массивов.
  Поддержать вложенные структуры и массивы. При ошибке парсинга вернуть Неопределено.
