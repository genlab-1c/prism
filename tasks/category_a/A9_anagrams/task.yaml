# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A9
name: Проверка анаграмм
category: A
difficulty: medium
entry_point: ЯвляютсяАнаграммами          # имя функции, которую вызывает харнесс
signature: "Функция ЯвляютсяАнаграммами(Первая, Вторая) Экспорт"
prompt: |
  Даны две строки. Вернуть Истина, если одна является анаграммой другой —
  то есть состоит из тех же букв в том же количестве, отличаясь лишь порядком.
  Регистр игнорировать, пробелы не учитывать. Иначе Ложь.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [строки, коллекции]
