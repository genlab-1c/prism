# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A8
name: RLE-сжатие строки
category: A
difficulty: easy
entry_point: СжатьRLE                      # имя функции, которую вызывает харнесс
signature: "Функция СжатьRLE(Строка) Экспорт"
prompt: |
  Реализовать простое RLE-сжатие (run-length encoding) строки.
  Каждую серию подряд идущих одинаковых символов заменить на сам символ,
  за которым следует число его повторений — ВСЕГДА с числом, даже если
  символ встречается один раз (например "aaab" → "a3b1").
  Регистр учитывается. Пустую строку вернуть как пустую.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [строки]
