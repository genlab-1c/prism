# Скрытые тест-кейсы A11 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; структуры — по подмножеству ключей).
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "\\w*Поиск"
  - "Бинарн\\w*"
tests:
  - args: [[1, 3, 5, 7, 9], 5]
    expected: 2
  - args: [[1, 3, 5, 7, 9], 1]
    expected: 0
  - args: [[1, 3, 5, 7, 9], 9]
    expected: 4
  - args: [[1, 3, 5, 7, 9], 4]
    expected: -1
  - args: [[], 5]
    expected: -1
  - args: [[42], 42]
    expected: 0
  - args: [[42], 1]
    expected: -1
  - args: [[-10, -3, 0, 8, 15, 42], 0]
    expected: 2
