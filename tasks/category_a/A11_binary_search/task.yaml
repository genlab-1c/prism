# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A11
name: Бинарный поиск в массиве
category: A
difficulty: easy
entry_point: БинарныйПоиск               # имя функции, которую вызывает харнесс
signature: "Функция БинарныйПоиск(Массив, Значение) Экспорт"
prompt: |
  Дан массив чисел, отсортированный по возрастанию, и искомое значение.
  Вернуть индекс (нумерация с 0) элемента, равного значению, или -1, если
  значения в массиве нет. Реализовать именно методом бинарного (двоичного)
  поиска. Массив без дубликатов.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [алгоритм, коллекции]
