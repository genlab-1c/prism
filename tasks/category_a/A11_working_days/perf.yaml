# Исполнительная оценка O. Оптимум — арифметика: работа НЕ растёт с длиной периода →
# p_opt = 0 (первая A-задача с плоским оптимумом — сильнейший контраст «арифметика vs перебор»).
# Растёт вход = длина периода в днях. Наивный капкан — цикл по каждому дню (perf_baseline.bsl):
# число итераций растёт линейно с периодом → O(N). Праздников мало и фиксировано — их проход
# на класс роста не влияет.
p_opt: 0.0
sizes: [500, 1000, 2000, 4000]
gen: |
  ДатаНачала = Дата(2020, 1, 1);
  ДатаОкончания = ДатаНачала + {n} * 86400;
  Праздники = Новый Массив;
  Праздники.Добавить(Дата(2020, 1, 1));
  Праздники.Добавить(Дата(2020, 5, 1));
  Праздники.Добавить(Дата(2020, 12, 31));
call: "{entry}(ДатаНачала, ДатаОкончания, Праздники);"
