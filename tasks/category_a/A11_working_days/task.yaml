id: A11
name: Рабочие дни между датами
category: A
difficulty: medium
entry_point: РабочиеДни
signature: "Функция РабочиеДни(ДатаНачала, ДатаОкончания, Праздники) Экспорт"
prompt: |
  Даны две даты (начало и конец периода, обе включительно) и массив дат-праздников.
  Вернуть число рабочих дней в периоде: дней с понедельника по пятницу, не считая тех,
  что попали в массив праздников.

  Праздник учитывается, только если он попал в период И приходится на будний день
  (праздник в выходной или вне периода на результат не влияет). Если конец периода
  раньше начала — вернуть 0.
tags:
  skill: [даты]
