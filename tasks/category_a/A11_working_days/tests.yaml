entry_point_patterns:
  - "Рабочи\\w*Дн\\w*"
  - "\\w*РабочихДней"
  - "Рабочи\\w*"
tests:
  # 2024-01-01 — понедельник. Пн–Пт одной недели → 5 будней
  - args: [{__date__: "2024-01-01"}, {__date__: "2024-01-05"}, []]
    expected: 5
  # полная неделя Пн–Вс → те же 5 будней
  - args: [{__date__: "2024-01-01"}, {__date__: "2024-01-07"}, []]
    expected: 5
  # ровно две недели → 10 будней
  - args: [{__date__: "2024-01-01"}, {__date__: "2024-01-14"}, []]
    expected: 10
  # только выходные (сб–вс) → 0
  - args: [{__date__: "2024-01-06"}, {__date__: "2024-01-07"}, []]
    expected: 0
  # один будний день (среда)
  - args: [{__date__: "2024-01-03"}, {__date__: "2024-01-03"}, []]
    expected: 1
  # один выходной день (суббота)
  - args: [{__date__: "2024-01-06"}, {__date__: "2024-01-06"}, []]
    expected: 0
  # конец раньше начала → 0
  - args: [{__date__: "2024-01-10"}, {__date__: "2024-01-05"}, []]
    expected: 0
  # праздник в будни внутри периода вычитается (среда 01-03)
  - args: [{__date__: "2024-01-01"}, {__date__: "2024-01-05"}, [{__date__: "2024-01-03"}]]
    expected: 4
  # праздник в выходной не влияет (суббота 01-06)
  - args: [{__date__: "2024-01-01"}, {__date__: "2024-01-07"}, [{__date__: "2024-01-06"}]]
    expected: 5
  # праздник вне периода не влияет
  - args: [{__date__: "2024-01-08"}, {__date__: "2024-01-12"}, [{__date__: "2024-01-01"}]]
    expected: 5
  # целый январь 2024 (31 день, Пн-старт) → 23 будня
  - args: [{__date__: "2024-01-01"}, {__date__: "2024-01-31"}, []]
    expected: 23
  # два праздника-будня в длинном периоде
  - args: [{__date__: "2024-01-01"}, {__date__: "2024-01-31"}, [{__date__: "2024-01-01"}, {__date__: "2024-01-15"}]]
    expected: 21
