# Исполнительная оценка O (ось O, нога по исполнению — см. metrics/smop_l1_auto.yaml O.exec_scoring).
# gen строит вход размера {n}; call вызывает функцию кандидата ({entry} — её имя, детектится).
# p_opt — оптимальный показатель роста задачи: сортировка сравнением = N·logN ≈ N^1.1.
p_opt: 1.1
sizes: [200, 400, 800, 1600]
gen: |
  М = Новый Массив;
  Сд = 12345;
  Для Сч = 1 По {n} Цикл
      Сд = (Сд * 48271) % 2147483647;
      М.Добавить(Сд % 1000000);
  КонецЦикла;
call: "{entry}(М);"
