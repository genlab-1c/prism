# Скрытые тест-кейсы A1 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; структуры — по подмножеству ключей).
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "Сортир\\w*"
tests:
  - args: [[3, 1, 2]]
    expected: [1, 2, 3]
  - args: [[]]
    expected: []
  - args: [[5]]
    expected: [5]
  - args: [[9, 9, 1, 0, -4]]
    expected: [-4, 0, 1, 9, 9]
