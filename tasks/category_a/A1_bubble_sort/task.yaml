# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A1
name: Сортировка пузырьком
category: A
difficulty: easy
entry_point: СортировкаПузырьком          # имя функции, которую вызывает харнесс
signature: "Функция СортировкаПузырьком(ИсходныйМассив) Экспорт"
prompt: |
  Написать функцию сортировки массива чисел методом пузырька.
  Параметры: массив чисел. Вернуть отсортированный массив по возрастанию.
  Исходный массив не изменять.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [коллекции, алгоритм]
