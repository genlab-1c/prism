id: A12
name: Убрать все вхождения значения
category: A
difficulty: easy
entry_point: УбратьЗначение
signature: "Функция УбратьЗначение(Массив, Значение) Экспорт"
prompt: |
  Дан массив и значение. Вернуть НОВЫЙ массив, из которого убраны все элементы,
  равные этому значению, с сохранением порядка остальных. Исходный массив не изменять.

  Если значение в массиве не встречается — вернуть массив с тем же составом.
  Если удалены все элементы — вернуть пустой массив.
tags:
  skill: [коллекции]
