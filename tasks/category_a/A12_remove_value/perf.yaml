# Исполнительная оценка O. Оптимум — собрать новый массив за один проход, O(N) → p_opt = 1.0.
# Наивный капкан — удалять вхождения на месте через Массив.Удалить в прямом цикле: каждое
# удаление сдвигает хвост, O(N) на удаление → O(N²) (perf_baseline.bsl). Сдвиг СКРЫТ во
# встроенной команде — его видит расширенный cost_model (ПризмаУдалить). Худший вход:
# все элементы равны значению → каждое удаление у начала сдвигает почти весь массив.
p_opt: 1.0
sizes: [500, 1000, 2000, 4000]
gen: |
  Массив = Новый Массив;
  Для Сч = 1 По {n} Цикл
      Массив.Добавить(777);
  КонецЦикла;
call: "{entry}(Массив, 777);"
