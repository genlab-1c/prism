entry_point_patterns:
  - "Убрать\\w*Значени\\w*"
  - "Убрать\\w*"
  - "\\w*Значени\\w*"
tests:
  # обычный случай — два вхождения
  - args: [[1, 2, 3, 2, 1], 2]
    expected: [1, 3, 1]
  # пустой массив
  - args: [[], 5]
    expected: []
  # все элементы равны значению → пусто
  - args: [[7, 7, 7], 7]
    expected: []
  # значение не встречается → состав не меняется
  - args: [[1, 2, 3], 9]
    expected: [1, 2, 3]
  # один элемент, равен
  - args: [[5], 5]
    expected: []
  # один элемент, не равен
  - args: [[5], 3]
    expected: [5]
  # значение по краям и в середине
  - args: [[0, 1, 0, 2, 0], 0]
    expected: [1, 2]
  # отрицательные
  - args: [[-1, 2, -1, 3], -1]
    expected: [2, 3]
  # подряд идущие вхождения
  - args: [[9, 9, 1, 9, 9, 2], 9]
    expected: [1, 2]
  # строки — сравнение по значению работает и для них
  - args: [["a", "b", "a", "c"], "a"]
    expected: ["b", "c"]
