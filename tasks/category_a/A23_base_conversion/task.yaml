# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A23
name: Перевод в систему счисления
category: A
difficulty: medium
entry_point: ВСистемуСчисления          # имя функции, которую вызывает харнесс
signature: "Функция ВСистемуСчисления(Число, Основание) Экспорт"
prompt: |
  Дано неотрицательное целое число и основание системы счисления (от 2 до 16).
  Вернуть строку — представление числа в этой системе счисления.
  Цифры больше девяти обозначать заглавными латинскими буквами A–F.
  Число 0 представляется как "0".

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [числа, алгоритм]
