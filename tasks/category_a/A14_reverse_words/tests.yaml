entry_point_patterns:
  - "Развернут\\w*"
  - "Перевернут\\w*"
  - "\\w*Слов\\w*"
tests:
  - args: ["привет мир"]
    expected: "мир привет"
  - args: ["один два три"]
    expected: "три два один"
  # одно слово
  - args: ["слово"]
    expected: "слово"
  # пустая строка
  - args: [""]
    expected: ""
  # только пробелы → пусто
  - args: ["   "]
    expected: ""
  # лишние пробелы: в начале, в конце, несколько подряд
  - args: ["  много   пробелов  "]
    expected: "пробелов много"
  - args: ["a b c d"]
    expected: "d c b a"
  # два слова
  - args: ["код 1С"]
    expected: "1С код"
  # слова из цифр — не переворачиваем сами слова
  - args: ["12 345 6"]
    expected: "6 345 12"
