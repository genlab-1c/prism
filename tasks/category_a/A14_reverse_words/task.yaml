id: A14
name: Развернуть порядок слов
category: A
difficulty: easy
entry_point: РазвернутьСлова
signature: "Функция РазвернутьСлова(Строка) Экспорт"
prompt: |
  Дана строка из слов, разделённых пробелами. Вернуть строку, где слова идут в
  обратном порядке, разделённые одним пробелом. Сами слова не переворачивать.

  Например, из «привет мир друзья» получить «друзья мир привет».
  Лишние пробелы (в начале, в конце, несколько подряд) в результат не переносить:
  между словами ровно один пробел. Пустая строка (или только пробелы) → пустая строка.
tags:
  skill: [строки]
