# Исполнительная оценка O. Оптимум — массив слов в обратном порядке + СтрСоединить, O(N) →
# p_opt = 1.0. Наивный капкан — собирать результат ПОСЛОВНОЙ склейкой строки в цикле, O(N²)
# (инструментируется ПризмаСклейка; см. perf_baseline.bsl). Вход — строка из N слов.
# sizes умеренные: инструментированная склейка O(N²) под codestat на больших N упирается.
p_opt: 1.0
sizes: [200, 400, 800, 1600]
gen: |
  Части = Новый Массив;
  Для Сч = 1 По {n} Цикл
      Части.Добавить("слово" + Формат(Сч, "ЧГ="));
  КонецЦикла;
  Текст = СтрСоединить(Части, " ");
call: "{entry}(Текст);"
