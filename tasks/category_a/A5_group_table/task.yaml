# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
id: A5
name: Группировка таблицы значений
category: A
difficulty: hard
entry_point: СгруппироватьТаблицу
signature: "Функция СгруппироватьТаблицу(Таблица, КолонкаГруппировки, КолонкаСуммы) Экспорт"
prompt: |
  Написать функцию группировки таблицы значений. Параметры: таблица значений, имя колонки
  для группировки, имя числовой колонки для суммирования. Вернуть новую таблицу значений с
  двумя колонками: значение группировки и сумма. Исходную таблицу не изменять.

# M-тестирование пока без tests.yaml: вход/выход — ТаблицаЗначений (платформенный объект),
# а OneScript-харнесс строит аргументы только из скаляров/массивов/структур/дат.
# РЕШЕНО (а): расширить харнесс — собирать ТЗ из списка структур (колонки + строки).
# tests.yaml появится после доработки харнесса.
m_testing: pending_harness
