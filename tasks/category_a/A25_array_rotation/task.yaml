# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A25
name: Циклический сдвиг массива
category: A
difficulty: medium
entry_point: СдвинутьМассив               # имя функции, которую вызывает харнесс
signature: "Функция СдвинутьМассив(Массив, Сдвиг) Экспорт"
prompt: |
  Дан массив и целое число сдвига.
  Вернуть НОВЫЙ массив, циклически сдвинутый вправо на указанное число позиций
  (элементы с конца переходят в начало).
  Положительный сдвиг — вправо, отрицательный — влево.
  Сдвиг может превышать длину массива (берётся по модулю длины).
  Исходный массив не изменять. Пустой массив вернуть как пустой.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [коллекции, алгоритм]
