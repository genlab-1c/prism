# Скрытые тест-кейсы A25 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; структуры — по подмножеству ключей).
# Первый аргумент — массив, поэтому в args он обёрнут внешним списком.
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "Сдвинуть\\w*"
  - "\\w*Сдвиг\\w*"
  - "\\w*Ротац\\w*"
tests:
  - args: [[1, 2, 3, 4, 5], 2]
    expected: [4, 5, 1, 2, 3]
  - args: [[1, 2, 3, 4, 5], 0]
    expected: [1, 2, 3, 4, 5]
  - args: [[1, 2, 3, 4, 5], 5]
    expected: [1, 2, 3, 4, 5]
  - args: [[1, 2, 3, 4, 5], 7]
    expected: [4, 5, 1, 2, 3]
  - args: [[1, 2, 3], -1]
    expected: [2, 3, 1]
  - args: [[], 3]
    expected: []
  - args: [[42], 10]
    expected: [42]
