# Скрытые тест-кейсы A9 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; структуры — по подмножеству ключей).
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "Проверит\\w*ИНН"
  - "\\w*ИНН\\w*"
tests:
  - args: ["7707083893"]     # валидный 10-значный (юрлицо)
    expected: true
  - args: ["500100732259"]   # валидный 12-значный (физлицо/ИП)
    expected: true
  - args: ["7707083890"]     # неверная контрольная цифра
    expected: false
  - args: ["123"]            # слишком короткий
    expected: false
  - args: ["abcdefghij"]     # буквы вместо цифр
    expected: false
  - args: [""]               # пустая строка
    expected: false
  - args: ["77070838931"]    # 11 знаков — недопустимая длина
    expected: false
