# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A9
name: Валидация ИНН
category: A
difficulty: medium
entry_point: ПроверитьИНН                  # имя функции, которую вызывает харнесс
signature: "Функция ПроверитьИНН(ИНН) Экспорт"
prompt: |
  Написать функцию проверки корректности ИНН.
  Параметры: ИНН строкой. Вернуть Булево — корректен ли ИНН.
  Правила корректности:
    - строка состоит только из цифр;
    - длина равна 10 (юридическое лицо) или 12 (физическое лицо / ИП);
    - контрольные цифры сходятся по стандартному алгоритму проверки ИНН
      (для 10-значного — одна контрольная цифра, для 12-значного — две).
  Любой другой ввод (пустая строка, буквы, иная длина) — вернуть Ложь.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [числа, строки]
