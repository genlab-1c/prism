# Исполнительная оценка O. Оптимум — быстрое возведение O(log Показатель): работа почти не
# растёт с показателем (логарифм) → p_opt = 0. Наивный капкан — умножать основание Показатель
# раз, O(Показатель) (perf_baseline.bsl). Растёт вход = Показатель. Модуль ~1e6, чтобы
# промежуточные произведения оставались в пределах точности чисел OneScript.
p_opt: 0.0
sizes: [1000, 2000, 4000, 8000]
gen: |
  Основание = 7;
  Показатель = {n};
  Модуль = 1000003;
call: "{entry}(Основание, Показатель, Модуль);"
