# Скрытые тест-кейсы A12 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; вложенные массивы поддерживаются).
# Аргумент функции один (массив интервалов), поэтому в args он обёрнут ещё одним
# внешним массивом-списком аргументов.
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "Объедин\\w*"
  - "\\w*Интервал\\w*"
tests:
  - args: [[[1, 3], [2, 6], [8, 10], [15, 18]]]
    expected: [[1, 6], [8, 10], [15, 18]]
  - args: [[[1, 4], [4, 5]]]
    expected: [[1, 5]]
  - args: [[]]
    expected: []
  - args: [[[1, 4]]]
    expected: [[1, 4]]
  - args: [[[1, 4], [2, 3]]]
    expected: [[1, 4]]
  - args: [[[5, 7], [1, 3], [2, 4]]]
    expected: [[1, 4], [5, 7]]
