# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
id: A2
name: Парсинг строки ФИО
category: A
difficulty: easy
entry_point: РазобратьФИО
signature: "Функция РазобратьФИО(СтрокаФИО) Экспорт"
prompt: |
  Написать функцию парсинга строки ФИО. Параметры: строка формата «Фамилия Имя Отчество».
  Вернуть структуру с полями: Фамилия, Имя, Отчество, Инициалы (формат «И.О.»),
  ФИОКраткое (формат «Фамилия И.О.»). Учесть случаи, когда отчество отсутствует.
