# A2: парсинг ФИО → Структура {Фамилия, Имя, Отчество, Инициалы "И.О.", ФИОКраткое "Фамилия И.О."}.
# Структуры сравниваются по ПОДМНОЖЕСТВУ ключей: при отсутствии отчества значение поля
# Отчество промптом не специфицировано ("" vs Неопределено) — его не проверяем.
entry_point_patterns:
  - "\\w*ФИО\\w*"
  - "Разобрать\\w*|Парс\\w*"
tests:
  - args: ["Иванов Пётр Сидорович"]
    expected: {"Фамилия": "Иванов", "Имя": "Пётр", "Отчество": "Сидорович",
               "Инициалы": "П.С.", "ФИОКраткое": "Иванов П.С."}
  - args: ["Петров Иван"]
    expected: {"Фамилия": "Петров", "Имя": "Иван",
               "Инициалы": "И.", "ФИОКраткое": "Петров И."}
