# Скрытые тест-кейсы A20 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; структуры — по подмножеству ключей).
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "НодИНок"
  - "\\w*НОД\\w*"
  - "\\w*НОК\\w*"
tests:
  - args: [12, 18]
    expected: {НОД: 6, НОК: 36}
  - args: [7, 5]
    expected: {НОД: 1, НОК: 35}
  - args: [4, 8]
    expected: {НОД: 4, НОК: 8}
  - args: [21, 6]
    expected: {НОД: 3, НОК: 42}
  - args: [13, 13]
    expected: {НОД: 13, НОК: 13}
  - args: [100, 10]
    expected: {НОД: 10, НОК: 100}
