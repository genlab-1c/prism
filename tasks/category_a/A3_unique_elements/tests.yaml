# A7: уникальные элементы, порядок первого появления сохраняется.
entry_point_patterns:
  - "\\w*Уникальн\\w*"
tests:
  - args: [[1, 2, 2, 3, 1]]
    expected: [1, 2, 3]
  - args: [[]]
    expected: []
  - args: [[5, 5, 5]]
    expected: [5]
  - args: [[3, 1, 2]]
    expected: [3, 1, 2]
  - args: [["а", "б", "а", "в", "б"]]
    expected: ["а", "б", "в"]
