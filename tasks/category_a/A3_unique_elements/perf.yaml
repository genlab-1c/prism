# Исполнительная оценка O. Худший случай для наивного «Найти в цикле» — МНОГО уникальных
# (массив результата растёт ~N, перебор в нём становится O(N) на каждый элемент → O(N²)).
# Оптимум — Соответствие, O(N) → p_opt = 1.0. Стоимость встроенного Найти учитывает скорер.
p_opt: 1.0
sizes: [200, 400, 800, 1600]
gen: |
  М = Новый Массив;
  Сд = 12345;
  Для Сч = 1 По {n} Цикл
      Сд = (Сд * 48271) % 2147483647;
      М.Добавить(Сд % 2000000);
  КонецЦикла;
call: "{entry}(М);"
