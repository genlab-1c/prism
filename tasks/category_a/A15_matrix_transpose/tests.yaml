# Скрытые тест-кейсы A15 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; вложенные массивы поддерживаются).
# Аргумент один — матрица, поэтому в args она обёрнута внешним списком.
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "Транспон\\w*"
  - "\\w*Матриц\\w*"
tests:
  - args: [[[1, 2, 3], [4, 5, 6]]]
    expected: [[1, 4], [2, 5], [3, 6]]
  - args: [[[1, 2], [3, 4], [5, 6]]]
    expected: [[1, 3, 5], [2, 4, 6]]
  - args: [[[1, 2, 3]]]
    expected: [[1], [2], [3]]
  - args: [[[1], [2], [3]]]
    expected: [[1, 2, 3]]
  - args: [[]]
    expected: []
  - args: [[[42]]]
    expected: [[42]]
