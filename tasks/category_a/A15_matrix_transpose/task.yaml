# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A15
name: Транспонирование матрицы
category: A
difficulty: medium
entry_point: Транспонировать            # имя функции, которую вызывает харнесс
signature: "Функция Транспонировать(Матрица) Экспорт"
prompt: |
  Дана матрица — массив строк, где каждая строка это массив чисел одинаковой длины.
  Вернуть транспонированную матрицу: строки исходной матрицы становятся столбцами.
  Пустую матрицу вернуть как пустой массив.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [коллекции]
