# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A22
name: Цифровой корень
category: A
difficulty: easy
entry_point: ЦифровойКорень            # имя функции, которую вызывает харнесс
signature: "Функция ЦифровойКорень(Число) Экспорт"
prompt: |
  Дано неотрицательное целое число. Вернуть его цифровой корень — результат
  многократного суммирования цифр числа до тех пор, пока не останется одна цифра.
  Например: 38 → 3 + 8 = 11 → 1 + 1 = 2.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [числа]
