# Скрытые тест-кейсы A22 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; структуры — по подмножеству ключей).
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "ЦифровойКорень"
  - "\\w*Корень"
  - "\\w*Цифр\\w*"
tests:
  - args: [0]
    expected: 0
  - args: [5]
    expected: 5
  - args: [38]
    expected: 2
  - args: [123]
    expected: 6
  - args: [99999]
    expected: 9
  - args: [12345]
    expected: 6
  - args: [10]
    expected: 1
