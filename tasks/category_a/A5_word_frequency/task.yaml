# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A5
name: Частота слов
category: A
difficulty: medium
entry_point: ЧастотаСлов                  # имя функции, которую вызывает харнесс
signature: "Функция ЧастотаСлов(Текст) Экспорт"
prompt: |
  Дана строка текста. Вернуть Структуру, где ключ — слово (в нижнем регистре),
  а значение — сколько раз это слово встретилось в тексте.
  Слова разделяются пробелами и знаками препинания; регистр игнорируется
  (СЛОВО и слово — одно и то же слово).

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [строки, коллекции]
