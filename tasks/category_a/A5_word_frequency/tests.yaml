# Скрытые тест-кейсы A16 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; структуры — по подмножеству ключей).
# expected — Структура (в YAML словарь): ключ — слово в нижнем регистре, значение — счётчик.
# Ключи — только буквы (валидные идентификаторы Структуры), без ведущих цифр.
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "ЧастотаСлов"
  - "\\w*Частот\\w*"
tests:
  - args: ["кот и кот"]
    expected: {кот: 2, и: 1}
  - args: ["Привет, привет МИР"]
    expected: {привет: 2, мир: 1}
  - args: ["один два три"]
    expected: {один: 1, два: 1, три: 1}
  - args: ["Да да ДА нет"]
    expected: {да: 3, нет: 1}
