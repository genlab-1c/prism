# Исполнительная оценка O. Скрытая O(N²) — посимвольная склейка очищенной строки в цикле
# (учитывает ПризмаСклейка). Оптимум — массив + СтрСоединить, O(N) → p_opt = 1.0.
# Текст строится массивом+СтрСоединить, чтобы сама генерация была O(N).
# sizes умеренные: инструментированная склейка O(N²) под codestat на больших N упирается
# в таймаут 15с; до 2400 рост класса меряется чисто (медленный эталон → O=4, не O=2).
p_opt: 1.0
sizes: [300, 600, 1200, 2400]
gen: |
  Симв = Новый Массив;
  Сд = 12345;
  Для Сч = 1 По {n} Цикл
      Сд = (Сд * 48271) % 2147483647;
      Если Сд % 6 = 0 Тогда
          Симв.Добавить(" ");
      Иначе
          Симв.Добавить(Сред("abcde", (Сд % 5) + 1, 1));
      КонецЕсли;
  КонецЦикла;
  Текст = СтрСоединить(Симв, "");
call: "{entry}(Текст);"
