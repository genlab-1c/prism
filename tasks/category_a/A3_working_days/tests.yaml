# A3: рабочие дни между датами включительно, исключая Сб/Вс.
# Опорные даты: 2026-06-01 — понедельник.
entry_point_patterns:
  - "\\w*Рабоч\\w*Дн\\w*"
  - "Подсчит\\w*|Колич\\w*"
tests:
  - args: [{"__date__": "2026-06-01"}, {"__date__": "2026-06-05"}]   # пн..пт
    expected: 5
  - args: [{"__date__": "2026-06-06"}, {"__date__": "2026-06-07"}]   # сб..вс
    expected: 0
  - args: [{"__date__": "2026-06-01"}, {"__date__": "2026-06-01"}]   # один рабочий день
    expected: 1
  - args: [{"__date__": "2026-06-01"}, {"__date__": "2026-06-08"}]   # пн..пн через выходные
    expected: 6
