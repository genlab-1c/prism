# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
id: A3
name: Подсчёт рабочих дней между двумя датами
category: A
difficulty: easy
entry_point: ПодсчитатьРабочиеДни
signature: "Функция ПодсчитатьРабочиеДни(ДатаНачала, ДатаОкончания) Экспорт"
prompt: |
  Написать функцию подсчёта рабочих дней между двумя датами. Параметры: дата начала,
  дата окончания. Вернуть количество рабочих дней, исключая субботу и воскресенье.
  Граничные даты включать в расчёт, если они являются рабочими днями.
