# Исполнительная оценка O. ВНИМАНИЕ: оптимум сам квадратичен (динамика O(n·m)) → p_opt = 2.0.
# Наивная рекурсия — O(3^длины), взрывается. sizes — ДЛИНЫ строк, малые: на 11 наивная
# рекурсия уже на пределе, а динамика мгновенна. Строки строятся массивом+СтрСоединить (gen O(n)).
p_opt: 2.0
sizes: [5, 7, 9, 11]
gen: |
  Алф = "abcdefghij";
  Ч1 = Новый Массив;
  Ч2 = Новый Массив;
  Сд = 12345;
  Для Сч = 1 По {n} Цикл
      Сд = (Сд * 48271) % 2147483647;
      Ч1.Добавить(Сред(Алф, (Сд % 10) + 1, 1));
      Сд = (Сд * 48271) % 2147483647;
      Ч2.Добавить(Сред(Алф, (Сд % 10) + 1, 1));
  КонецЦикла;
  Строка1 = СтрСоединить(Ч1, "");
  Строка2 = СтрСоединить(Ч2, "");
call: "{entry}(Строка1, Строка2);"
