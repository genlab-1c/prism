# Скрытые тест-кейсы A13 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; структуры — по подмножеству ключей).
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "Нормализ\\w*"
  - "\\w*Телефон\\w*"
tests:
  - args: ["8 (912) 345-67-89"]
    expected: "+7 (912) 345-67-89"
  - args: ["+79123456789"]
    expected: "+7 (912) 345-67-89"
  - args: ["9123456789"]
    expected: "+7 (912) 345-67-89"
  - args: ["8-912-345-67-89"]
    expected: "+7 (912) 345-67-89"
  - args: ["123"]
    expected: ""
  - args: [""]
    expected: ""
  - args: ["7 912 345 67 89"]
    expected: "+7 (912) 345-67-89"
