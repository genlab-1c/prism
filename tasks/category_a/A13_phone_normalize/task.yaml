# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A13
name: Нормализация телефонного номера
category: A
difficulty: medium
entry_point: НормализоватьТелефон        # имя функции, которую вызывает харнесс
signature: "Функция НормализоватьТелефон(Телефон) Экспорт"
prompt: |
  Написать функцию нормализации телефонного номера.
  Параметр: телефон строкой в произвольном формате (с пробелами, скобками,
  дефисами, ведущей 8 или +7). Привести к единому виду "+7 (XXX) XXX-XX-XX".
  Правила:
    - оставить только цифры;
    - если получилось 11 цифр и первая 8 — заменить её на 7;
    - если 10 цифр — добавить 7 в начало;
    - если 11 цифр и первая 7 — оставить.
  Если после этого не ровно 11 цифр (начинающихся с 7) — вернуть пустую строку "".

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [строки]
