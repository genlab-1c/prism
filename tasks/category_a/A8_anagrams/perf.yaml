# Исполнительная оценка O. Оптимум — счётчики символов в Соответствии, O(N) → p_opt = 1.0.
# Наивное «для каждого символа первой искать/удалять во второй» — O(N²).
# Худший случай для поиска: символы РАЗЛИЧНЫ (иначе на плотном алфавите Найти обрывается
# рано и наив выглядит линейным), а вторая строка — ОБРАТНАЯ перестановка первой (искомый
# символ каждый раз в конце остатка). Строки — анаграммы, поэтому функция не обрывается
# ранним «не найдено». Символы из диапазона CJK: различны и регистро-инвариантны (НРег их не трогает).
p_opt: 1.0
sizes: [500, 1000, 2000, 4000]
gen: |
  Симв = Новый Массив;
  Для Сч = 1 По {n} Цикл
      Симв.Добавить(Символ(19967 + Сч));
  КонецЦикла;
  Первая = СтрСоединить(Симв, "");
  Обратные = Новый Массив;
  Для Сч = 1 По {n} Цикл
      Обратные.Добавить(Симв[{n} - Сч]);
  КонецЦикла;
  Вторая = СтрСоединить(Обратные, "");
call: "{entry}(Первая, Вторая);"
