# Исполнительная оценка O. Оптимум — счётчики в Соответствии, O(N) → p_opt = 1.0. Наивное
# «для каждого символа искать/удалять во второй строке» — O(N²). Худший случай — строки
# РАВНЫ (точно анаграммы) → проверка не обрывается рано, обрабатываются все символы.
p_opt: 1.0
sizes: [500, 1000, 2000, 4000]
gen: |
  Симв = Новый Массив;
  Сд = 12345;
  Для Сч = 1 По {n} Цикл
      Сд = (Сд * 48271) % 2147483647;
      Симв.Добавить(Сред("abcde", (Сд % 5) + 1, 1));
  КонецЦикла;
  Первая = СтрСоединить(Симв, "");
  Вторая = Первая;
call: "{entry}(Первая, Вторая);"
