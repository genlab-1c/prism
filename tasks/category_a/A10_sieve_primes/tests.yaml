# Скрытые тест-кейсы A24 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; структуры — по подмножеству ключей).
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "ПростыеЧисла"
  - "\\w*Прост\\w*"
  - "\\w*Эратосфен\\w*"
tests:
  - args: [10]
    expected: [2, 3, 5, 7]
  - args: [2]
    expected: [2]
  - args: [1]
    expected: []
  - args: [0]
    expected: []
  - args: [20]
    expected: [2, 3, 5, 7, 11, 13, 17, 19]
  - args: [13]
    expected: [2, 3, 5, 7, 11, 13]
