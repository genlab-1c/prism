# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A10
name: Простые числа до границы
category: A
difficulty: medium
entry_point: ПростыеЧисла                 # имя функции, которую вызывает харнесс
signature: "Функция ПростыеЧисла(Граница) Экспорт"
prompt: |
  Дано целое число — граница. Вернуть массив всех простых чисел, не превышающих
  границу (включительно), в порядке возрастания.
  Если простых нет (граница меньше 2) — вернуть пустой массив.
  Реализовать решетом Эратосфена.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [числа, алгоритм]
