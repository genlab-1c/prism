# Исполнительная оценка O. Вход — одно число Граница. Решето O(N·loglogN) ≈ линейно;
# наивная проверка делением O(N·√N). p_opt = 1.0. Граница ≤ 16000, чтобы решето-эталон
# уверенно укладывалось в таймаут 15с, а наивное уже заметно отставало по росту.
p_opt: 1.0
sizes: [2000, 4000, 8000, 16000]
gen: |
  Граница = {n};
call: "{entry}(Граница);"
