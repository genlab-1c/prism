# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
id: A8
name: Проверка палиндрома
category: A
difficulty: medium
entry_point: ПроверитьПалиндром
signature: "Функция ПроверитьПалиндром(Строка) Экспорт"
prompt: |
  Написать функцию проверки, является ли строка палиндромом. Параметры: строка.
  Вернуть Истина, если строка читается одинаково в обе стороны, иначе Ложь.
  Регистр букв и пробелы не учитывать. Пустая строка — палиндром.
