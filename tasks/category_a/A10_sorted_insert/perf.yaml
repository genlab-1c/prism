# Исполнительная оценка O. Оптимум — собрать всё и отсортировать встроенной, O((n+k)·logN);
# видимая работа линейна → p_opt = 1.0. Наивный капкан — вставлять каждое значение на своё
# место через Массив.Вставить: позицию можно найти хоть двоичным поиском (дёшево), но сам
# сдвиг хвоста внутри Вставить — O(n) на каждую вставку → O(N²), и он СКРЫТ во встроенной.
# Худший случай для сдвига: новые значения меньше всех существующих → вставка у начала →
# сдвигается почти весь массив каждый раз (см. perf_baseline.bsl).
p_opt: 1.0
sizes: [400, 800, 1600, 3200]
gen: |
  Отсортированный = Новый Массив;
  Для Сч = 1 По {n} Цикл
      Отсортированный.Добавить(1000000 + Сч);
  КонецЦикла;
  Значения = Новый Массив;
  Сд = 12345;
  Для Сч = 1 По {n} Цикл
      Сд = (Сд * 48271) % 2147483647;
      Значения.Добавить(Сд % 1000000);
  КонецЦикла;
call: "{entry}(Отсортированный, Значения);"
