id: A10
name: Вставка в отсортированный массив
category: A
difficulty: medium
entry_point: ВставитьВОтсортированный
signature: "Функция ВставитьВОтсортированный(Отсортированный, Значения) Экспорт"
prompt: |
  Дан массив чисел, отсортированный по возрастанию, и массив новых значений в
  произвольном порядке. Вернуть НОВЫЙ массив, содержащий все элементы исходного
  массива и все новые значения, отсортированный по возрастанию.

  Дубликаты сохраняются: если значение встречается несколько раз (в любом из
  массивов), столько же раз оно должно быть и в результате. Исходные массивы не
  изменять. Если оба массива пусты — вернуть пустой массив.
tags:
  skill: [коллекции]
