entry_point_patterns:
  - "Вставить\\w*Отсортир\\w*"
  - "\\w*Отсортир\\w*"
  - "Вставить\\w*"
tests:
  # обычное чередование
  - args: [[1, 3, 5], [2, 4]]
    expected: [1, 2, 3, 4, 5]
  # исходный пуст — новые не отсортированы
  - args: [[], [3, 1, 2]]
    expected: [1, 2, 3]
  # новых нет — вернуть копию исходного
  - args: [[1, 2, 3], []]
    expected: [1, 2, 3]
  # оба пусты
  - args: [[], []]
    expected: []
  # одиночные элементы
  - args: [[5], [1]]
    expected: [1, 5]
  # дубликаты сохраняются
  - args: [[2, 2, 4], [2, 3]]
    expected: [2, 2, 2, 3, 4]
  # все новые полностью повторяют существующие
  - args: [[1, 1, 1], [1, 1]]
    expected: [1, 1, 1, 1, 1]
  # вставка по краям и в середину
  - args: [[10, 20, 30], [5, 25, 35]]
    expected: [5, 10, 20, 25, 30, 35]
  # отрицательные числа
  - args: [[-5, 0, 5], [-3, 3]]
    expected: [-5, -3, 0, 3, 5]
  # все новые меньше всех существующих (вставка в начало)
  - args: [[100, 200], [1, 2, 3]]
    expected: [1, 2, 3, 100, 200]
