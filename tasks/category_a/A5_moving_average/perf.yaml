# Исполнительная оценка O. Худший случай для наивного пересчёта окна — большое окно.
# Наивный: O(N·окно); скользящая сумма: O(N). Окно ~ N/4 → наивный O(N²). p_opt = 1.0.
p_opt: 1.0
sizes: [200, 400, 800, 1600]
gen: |
  М = Новый Массив;
  Сд = 12345;
  Для Сч = 1 По {n} Цикл
      Сд = (Сд * 48271) % 2147483647;
      М.Добавить(Сд % 1000000);
  КонецЦикла;
  Окно = Цел({n} / 4);
call: "{entry}(М, Окно);"
