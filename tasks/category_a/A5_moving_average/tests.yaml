# Скрытые тест-кейсы A14 (ось M). Харнесс вызывает entry_point(args) в OneScript
# и сравнивает с expected (deep-equal; структуры — по подмножеству ключей).
entry_point_patterns:        # приоритетные регэкспы поиска функции в коде кандидата
  - "Скольз\\w*"
  - "\\w*Среднее"
tests:
  - args: [[1, 2, 3, 4, 5], 2]
    expected: [1.5, 2.5, 3.5, 4.5]
  - args: [[1, 2, 3, 4, 5], 3]
    expected: [2, 3, 4]
  - args: [[1, 2, 3], 1]
    expected: [1, 2, 3]
  - args: [[1, 2], 5]
    expected: []
  - args: [[], 2]
    expected: []
  - args: [[10, 20, 30, 40], 4]
    expected: [25]
