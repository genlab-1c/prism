# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A5
name: Скользящее среднее
category: A
difficulty: medium
entry_point: СкользящееСреднее            # имя функции, которую вызывает харнесс
signature: "Функция СкользящееСреднее(Массив, Окно) Экспорт"
prompt: |
  Дан массив чисел и размер окна (целое >= 1).
  Вернуть массив скользящих средних: для каждого набора из «Окно» подряд идущих
  элементов — их среднее арифметическое.
  Длина результата = количество элементов − Окно + 1.
  Если окно больше длины массива — вернуть пустой массив.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [коллекции, числа]
