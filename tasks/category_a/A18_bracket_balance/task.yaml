# Задача категории A (алгоритмическая, без метаданных). Исполняется в OneScript.
# Применимость осей — в metrics/smop.yaml (для категории A: P = N/A).
# Параметры генерации (модель/temperature/seed/system_prompt) — НЕ здесь, а в run-config.
id: A18
name: Баланс скобок
category: A
difficulty: medium
entry_point: СкобкиСбалансированы          # имя функции, которую вызывает харнесс
signature: "Функция СкобкиСбалансированы(Строка) Экспорт"
prompt: |
  Дана строка, содержащая скобки трёх видов — круглые (), квадратные [] и
  фигурные {} — и, возможно, другие символы. Вернуть Истина, если все скобки
  корректно сбалансированы (каждая открывающая закрывается соответствующей
  закрывающей в правильном порядке вложенности), иначе Ложь.
  Прочие символы игнорируются. Пустая строка сбалансирована.

# Теги — срезы анализа (словарь tasks/tags.yaml)
tags:
  skill: [строки, алгоритм]
