# A5: группировка ТаблицыЗначений → новая ТЗ {колонка группировки, сумма}.
# Вход/выход — ТаблицаЗначений: в tests.yaml она задаётся маркером
#   {"__table__": {"columns": [...], "rows": [[...], ...]}}
# Харнесс собирает из этого ТЗ (harness/score/meaning.py:_value), а компаратор
# сравнивает ТЗ БЕЗ учёта порядка строк (порядок группировки не специфицирован).
entry_point_patterns:
  - "Сгруппир\\w*|Группир\\w*"
tests:
  - args:
      - {"__table__": {"columns": ["Товар", "Количество"],
                       "rows": [["Яблоко", 5], ["Груша", 3], ["Яблоко", 2]]}}
      - "Товар"
      - "Количество"
    expected: {"__table__": {"columns": ["Товар", "Количество"],
                            "rows": [["Яблоко", 7], ["Груша", 3]]}}
  - args:
      - {"__table__": {"columns": ["Категория", "Сумма"],
                       "rows": [["A", 10], ["B", 20], ["A", 30], ["B", 5]]}}
      - "Категория"
      - "Сумма"
    expected: {"__table__": {"columns": ["Категория", "Сумма"],
                            "rows": [["A", 40], ["B", 25]]}}
  - args:
      - {"__table__": {"columns": ["Город", "Продажи"], "rows": [["Москва", 100]]}}
      - "Город"
      - "Продажи"
    expected: {"__table__": {"columns": ["Город", "Продажи"], "rows": [["Москва", 100]]}}
