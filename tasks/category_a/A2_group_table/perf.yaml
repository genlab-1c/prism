# Исполнительная оценка O. Скрытая O(N²) — НайтиСтроки по растущей таблице результата в
# цикле (учитывает ПризмаНайтиСтроки). Оптимум — Соответствие группа→строка, O(N) → p_opt = 1.0.
# Худший случай — МНОГО групп (Группа = Сд % {n}) → результат растёт ~N, поиск в нём дорожает.
p_opt: 1.0
sizes: [200, 400, 800, 1600]
gen: |
  Таблица = Новый ТаблицаЗначений;
  Таблица.Колонки.Добавить("Группа");
  Таблица.Колонки.Добавить("Сумма");
  Сд = 12345;
  Для Сч = 1 По {n} Цикл
      Сд = (Сд * 48271) % 2147483647;
      Строка = Таблица.Добавить();
      Строка.Группа = Сд % {n};
      Строка.Сумма = Сд % 1000;
  КонецЦикла;
call: '{entry}(Таблица, "Группа", "Сумма");'
